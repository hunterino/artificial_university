  import 'package:flutter/material.dart';
  import '../../../models/course_detail_model.dart';
  import '../../../services/ai_service.dart';

  class AiChatInterface extends StatefulWidget {
    final Quiz? quiz;
    final MajorAssignment? assignment;
    final QuizQuestion? currentQuestion;

    const AiChatInterface({
      super.key,
      this.quiz,
      this.assignment,
      this.currentQuestion,
    });

    @override
    State<AiChatInterface> createState() => _AiChatInterfaceState();
  }

  class _AiChatInterfaceState extends State<AiChatInterface> {
    final List<ChatMessage> _messages = [];
    final ScrollController _scrollController = ScrollController();
    final AIService _aiService = AIService();
    bool _isLoading = false;

    @override
    void initState() {
      super.initState();
      _initializeChat();
    }

    @override
    void didUpdateWidget(AiChatInterface oldWidget) {
      super.didUpdateWidget(oldWidget);
      if (widget.currentQuestion != oldWidget.currentQuestion && widget.currentQuestion != null) {
        _initializeChat();
      }
    }

    void _initializeChat() {
      _messages.clear();
      if (widget.currentQuestion != null) {
        _messages.add(ChatMessage(
          text: widget.currentQuestion!.question,
          isUser: false,
          isQuestion: true,
        ));
        _sendQuestionToAI();
      } else if (widget.assignment != null) {
        _messages.add(ChatMessage(
          text: 'Assignment: ${widget.assignment!.title}\n\n${widget.assignment!.description}',
          isUser: false,
          isQuestion: true,
        ));
        _sendAssignmentToAI();
      }
      _scrollToBottom();
    }

    Future<void> _sendQuestionToAI() async {
      if (widget.currentQuestion == null) return;

      setState(() => _isLoading = true);

      try {
        final response = await _aiService.generateAIResponse(
          widget.currentQuestion!.question,
          'Quiz context: ${widget.quiz?.topic ?? ""}',
        );

        _messages.add(ChatMessage(
          text: response,
          isUser: true,
          isAiResponse: true,
        ));

        // Evaluate the response
        final evaluation = await _aiService.evaluateResponse(
          response,
          widget.currentQuestion!.answer,
          widget.currentQuestion!.rubric,
        );

        _messages.add(ChatMessage(
          text: _formatEvaluation(evaluation),
          isUser: false,
          isEvaluation: true,
          evaluation: evaluation,
        ));

      } catch (e) {
        _messages.add(ChatMessage(
          text: 'Error generating AI response: $e',
          isUser: false,
          isError: true,
        ));
      }

      setState(() => _isLoading = false);
      _scrollToBottom();
    }

    Future<void> _sendAssignmentToAI() async {
      if (widget.assignment == null) return;

      setState(() => _isLoading = true);

      try {
        final response = await _aiService.generateAIResponse(
          'Complete this assignment: ${widget.assignment!.description}',
          'Assignment objectives: ${widget.assignment!.objectives.join(", ")}',
        );

        _messages.add(ChatMessage(
          text: response,
          isUser: true,
          isAiResponse: true,
        ));

      } catch (e) {
        _messages.add(ChatMessage(
          text: 'Error generating AI response: $e',
          isUser: false,
          isError: true,
        ));
      }

      setState(() => _isLoading = false);
      _scrollToBottom();
    }

    String _formatEvaluation(Map<String, dynamic> evaluation) {
      final buffer = StringBuffer();
      buffer.writeln('📊 AI Response Evaluation\n');
  
      final totalScore = evaluation['total_score'];
      if (totalScore != null) {
        buffer.writeln('Overall Score: ${totalScore['earned']}/${totalScore['total']} (${totalScore['percentage']}%)\n');
      }

      evaluation.forEach((key, value) {
        if (key != 'total_score' && value is Map) {
          final points = value['points_earned'] ?? 0;
          final maxPoints = value['max_points'] ?? 0;
          final feedback = value['feedback'] ?? '';
  
          buffer.writeln('$key: $points/$maxPoints');
          buffer.writeln('$feedback\n');
        }
      });

      return buffer.toString();
    }

    void _scrollToBottom() {
      WidgetsBinding.instance.addPostFrameCallback((_) {
        if (_scrollController.hasClients) {
          _scrollController.animateTo(
            _scrollController.position.maxScrollExtent,
            duration: const Duration(milliseconds: 300),
            curve: Curves.easeOut,
          );
        }
      });
    }

    @override
    Widget build(BuildContext context) {
      return Column(
        children: [
          Expanded(
            child: ListView.builder(
              controller: _scrollController,
              padding: const EdgeInsets.all(16),
              itemCount: _messages.length + (_isLoading ? 1 : 0),
              itemBuilder: (context, index) {
                if (_isLoading && index == _messages.length) {
                  return const _LoadingMessage();
                }
                return _ChatMessageWidget(message: _messages[index]);
              },
            ),
          ),
        ],
      );
    }
  }

  class ChatMessage {
    final String text;
    final bool isUser;
    final bool isQuestion;
    final bool isAiResponse;
    final bool isEvaluation;
    final bool isError;
    final Map<String, dynamic>? evaluation;

    ChatMessage({
      required this.text,
      required this.isUser,
      this.isQuestion = false,
      this.isAiResponse = false,
      this.isEvaluation = false,
      this.isError = false,
      this.evaluation,
    });
  }

  class _ChatMessageWidget extends StatelessWidget {
    final ChatMessage message;

    const _ChatMessageWidget({required this.message});

    @override
    Widget build(BuildContext context) {
      Color backgroundColor;
      Color textColor;
      IconData? icon;

      if (message.isQuestion) {
        backgroundColor = Theme.of(context).colorScheme.primary.withOpacity(0.1);
        textColor = Theme.of(context).colorScheme.primary;
        icon = Icons.quiz;
      } else if (message.isAiResponse) {
        backgroundColor = Theme.of(context).colorScheme.secondary.withOpacity(0.1);
        textColor = Theme.of(context).colorScheme.onSurface;
        icon = Icons.psychology;
      } else if (message.isEvaluation) {
        backgroundColor = Theme.of(context).colorScheme.tertiary.withOpacity(0.1);
        textColor = Theme.of(context).colorScheme.onSurface;
        icon = Icons.assessment;
      } else if (message.isError) {
        backgroundColor = Theme.of(context).colorScheme.error.withOpacity(0.1);
        textColor = Theme.of(context).colorScheme.error;
        icon = Icons.error;
      } else {
        backgroundColor = Theme.of(context).colorScheme.surfaceVariant;
        textColor = Theme.of(context).colorScheme.onSurface;
      }

      return Container(
        margin: const EdgeInsets.only(bottom: 16),
        child: Row(
          crossAxisAlignment: CrossAxisAlignment.start,
          children: [
            if (icon != null) ...[
              Container(
                padding: const EdgeInsets.all(8),
                decoration: BoxDecoration(
                  color: backgroundColor,
                  borderRadius: BorderRadius.circular(8),
                ),
                child: Icon(icon, size: 20, color: textColor.withOpacity(0.7)),
              ),
              const SizedBox(width: 12),
            ],
            Expanded(
              child: Container(
                padding: const EdgeInsets.all(16),
                decoration: BoxDecoration(
                  color: backgroundColor,
                  borderRadius: BorderRadius.circular(12),
                  border: message.isEvaluation
                      ? Border.all(color: Theme.of(context).colorScheme.tertiary)
                      : null,
                ),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    if (message.isQuestion)
                      Text(
                        'Question',
                        style: Theme.of(context).textTheme.labelMedium?.copyWith(
                          color: textColor.withOpacity(0.7),
                          fontWeight: FontWeight.bold,
                        ),
                      )
                    else if (message.isAiResponse)
                      Text(
                        'AI Response',
                        style: Theme.of(context).textTheme.labelMedium?.copyWith(
                          color: textColor.withOpacity(0.7),
                          fontWeight: FontWeight.bold,
                        ),
                      )
                    else if (message.isEvaluation)
                      Text(
                        'Evaluation',
                        style: Theme.of(context).textTheme.labelMedium?.copyWith(
                          color: textColor.withOpacity(0.7),
                          fontWeight: FontWeight.bold,
                        ),
                      ),
                    if (message.isQuestion || message.isAiResponse || message.isEvaluation)
                      const SizedBox(height: 8),
                    Text(
                      message.text,
                      style: Theme.of(context).textTheme.bodyMedium?.copyWith(
                        color: textColor,
                        height: 1.5,
                      ),
                    ),
                    if (message.evaluation != null) ...[
                      const SizedBox(height: 16),
                      _EvaluationDetails(evaluation: message.evaluation!),
                    ],
                  ],
                ),
              ),
            ),
          ],
        ),
      );
    }
  }

  class _LoadingMessage extends StatelessWidget {
    const _LoadingMessage();

    @override
    Widget build(BuildContext context) {
      return Container(
        margin: const EdgeInsets.only(bottom: 16),
        child: Row(
          children: [
            Container(
              padding: const EdgeInsets.all(8),
              decoration: BoxDecoration(
                color: Theme.of(context).colorScheme.secondary.withOpacity(0.1),
                borderRadius: BorderRadius.circular(8),
              ),
              child: Icon(
                Icons.psychology,
                size: 20,
                color: Theme.of(context).colorScheme.secondary.withOpacity(0.7),
              ),
            ),
            const SizedBox(width: 12),
            Expanded(
              child: Container(
                padding: const EdgeInsets.all(20),
                decoration: BoxDecoration(
                  color: Theme.of(context).colorScheme.secondary.withOpacity(0.1),
                  borderRadius: BorderRadius.circular(12),
                ),
                child: Row(
                  children: [
                    SizedBox(
                      width: 20,
                      height: 20,
                      child: CircularProgressIndicator(
                        strokeWidth: 2,
                        valueColor: AlwaysStoppedAnimation<Color>(
                          Theme.of(context).colorScheme.secondary,
                        ),
                      ),
                    ),
                    const SizedBox(width: 12),
                    Text(
                      'AI is thinking...',
                      style: Theme.of(context).textTheme.bodyMedium?.copyWith(
                        color: Theme.of(context).colorScheme.secondary,
                        fontStyle: FontStyle.italic,
                      ),
                    ),
                  ],
                ),
              ),
            ),
          ],
        ),
      );
    }
  }

  class _EvaluationDetails extends StatelessWidget {
    final Map<String, dynamic> evaluation;

    const _EvaluationDetails({required this.evaluation});

    @override
    Widget build(BuildContext context) {
      final totalScore = evaluation['total_score'];
      if (totalScore == null) return const SizedBox.shrink();

      final percentage = totalScore['percentage'] as int;
      Color scoreColor;
      IconData scoreIcon;

      if (percentage >= 90) {
        scoreColor = Colors.green;
        scoreIcon = Icons.check_circle;
      } else if (percentage >= 70) {
        scoreColor = Colors.orange;
        scoreIcon = Icons.warning_amber;
      } else {
        scoreColor = Colors.red;
        scoreIcon = Icons.error;
      }

      return Container(
        padding: const EdgeInsets.all(12),
        decoration: BoxDecoration(
          color: scoreColor.withOpacity(0.1),
          borderRadius: BorderRadius.circular(8),
          border: Border.all(color: scoreColor.withOpacity(0.3)),
        ),
        child: Row(
          children: [
            Icon(scoreIcon, color: scoreColor, size: 24),
            const SizedBox(width: 12),
            Expanded(
              child: Column(
                crossAxisAlignment: CrossAxisAlignment.start,
                children: [
                  Text(
                    'Final Score: ${totalScore['earned']}/${totalScore['total']}',
                    style: Theme.of(context).textTheme.titleSmall?.copyWith(
                      fontWeight: FontWeight.bold,
                      color: scoreColor,
                    ),
                  ),
                  Text(
                    '$percentage% - ${_getGradeText(percentage)}',
                    style: Theme.of(context).textTheme.bodySmall?.copyWith(
                      color: scoreColor,
                    ),
                  ),
                ],
              ),
            ),
          ],
        ),
      );
    }

    String _getGradeText(int percentage) {
      if (percentage >= 90) return 'Excellent';
      if (percentage >= 80) return 'Good';
      if (percentage >= 70) return 'Satisfactory';
      if (percentage >= 60) return 'Needs Improvement';
      return 'Requires Significant Improvement';
    }
  }

  @override
  void dispose() {
    _scrollController.dispose();
    super.dispose();
  }
