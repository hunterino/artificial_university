lib/screens/courses/course_detail_screen.dart: |
  import 'package:flutter/material.dart';
  import 'package:provider/provider.dart';
  import '../../services/data_service.dart';
  import '../../models/course_detail_model.dart';
  import 'widgets/course_info_header.dart';
  import 'widgets/course_schedule.dart';
  import 'widgets/assessments_section.dart';
  import 'widgets/grading_breakdown.dart';

  class CourseDetailScreen extends StatefulWidget {
    const CourseDetailScreen({super.key});

    @override
    State<CourseDetailScreen> createState() => _CourseDetailScreenState();
  }

  class _CourseDetailScreenState extends State<CourseDetailScreen> {
    CourseDetail? courseDetail;
    bool isLoading = true;
    bool canTakeCourse = false;
    String? courseId;

    @override
    void didChangeDependencies() {
      super.didChangeDependencies();
      final id = ModalRoute.of(context)?.settings.arguments as String?;
      if (id != null && courseId != id) {
        courseId = id;
        _loadCourseDetail(id);
      }
    }

    Future<void> _loadCourseDetail(String id) async {
      setState(() => isLoading = true);
  
      final dataService = Provider.of<DataService>(context, listen: false);
      final detail = await dataService.loadCourseDetail(id);
      final exists = await dataService.courseDetailExists(id);
  
      setState(() {
        courseDetail = detail;
        canTakeCourse = exists;
        isLoading = false;
      });
    }

    @override
    Widget build(BuildContext context) {
      if (isLoading) {
        return Scaffold(
          appBar: AppBar(title: const Text('Course Details')),
          body: const Center(child: CircularProgressIndicator()),
        );
      }

      if (courseDetail == null) {
        return Scaffold(
          appBar: AppBar(title: const Text('Course Details')),
          body: const Center(
            child: Text('Course details not found'),
          ),
        );
      }

      return Scaffold(
        body: CustomScrollView(
          slivers: [
            SliverAppBar(
              expandedHeight: 200,
              pinned: true,
              flexibleSpace: FlexibleSpaceBar(
                title: Text(
                  courseDetail!.courseInfo.courseId,
                  style: const TextStyle(
                    color: Colors.white,
                    fontWeight: FontWeight.bold,
                  ),
                ),
                background: Container(
                  decoration: const BoxDecoration(
                    gradient: LinearGradient(
                      begin: Alignment.topLeft,
                      end: Alignment.bottomRight,
                      colors: [
                        Color(0xFF1E3A8A),
                        Color(0xFF3B82F6),
                      ],
                    ),
                  ),
                  child: const Stack(
                    children: [
                      Positioned(
                        right: -30,
                        top: 20,
                        child: Icon(
                          Icons.menu_book,
                          size: 150,
                          color: Colors.white24,
                        ),
                      ),
                    ],
                  ),
                ),
              ),
              actions: [
                Padding(
                  padding: const EdgeInsets.only(right: 8.0),
                  child: ElevatedButton.icon(
                    onPressed: canTakeCourse ? () {
                      Navigator.pushNamed(
                        context,
                        '/take-course',
                        arguments: courseDetail,
                      );
                    } : null,
                    icon: const Icon(Icons.psychology),
                    label: const Text('AI Take Course'),
                    style: ElevatedButton.styleFrom(
                      backgroundColor: canTakeCourse 
                          ? Theme.of(context).colorScheme.secondary
                          : Theme.of(context).colorScheme.surfaceVariant,
                      foregroundColor: canTakeCourse 
                          ? Colors.white
                          : Theme.of(context).colorScheme.onSurfaceVariant,
                    ),
                  ),
                ),
              ],
            ),
            SliverToBoxAdapter(
              child: Column(
                children: [
                  CourseInfoHeader(courseInfo: courseDetail!.courseInfo),
                  CourseSchedule(classSchedule: courseDetail!.classSchedule),
                  AssessmentsSection(assessments: courseDetail!.assessments),
                  GradingBreakdownWidget(gradingBreakdown: courseDetail!.gradingBreakdown),
                  const SizedBox(height: 32),
                ],
              ),
            ),
          ],
        ),
      );
    }
  }

