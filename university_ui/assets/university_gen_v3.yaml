lib/services/data_service.dart: |
  import 'dart:convert';
  import 'package:flutter/foundation.dart';
  import 'package:flutter/services.dart';
  import '../models/university_model.dart';
  import '../models/course_detail_model.dart';

  class DataService extends ChangeNotifier {
    University? _university;
    GeneralEducationRequirements? _generalEducationRequirements;
    List<DegreeProgram> _degreePrograms = [];
    List<Course> _allCourses = [];
    Map<String, CourseDetail> _courseDetails = {};

    University? get university => _university;
    GeneralEducationRequirements? get generalEducationRequirements => _generalEducationRequirements;
    List<DegreeProgram> get degreePrograms => _degreePrograms;
    List<Course> get allCourses => _allCourses;

    Future<void> loadDegreesData() async {
      try {
        final String response = await rootBundle.loadString('assets/degrees.json');
        final Map<String, dynamic> data = json.decode(response);
  
        _university = University.fromJson(data['university']);
        _generalEducationRequirements = GeneralEducationRequirements.fromJson(data['general_education_requirements']);
        _degreePrograms = (data['degree_programs'] as List)
            .map((e) => DegreeProgram.fromJson(e))
            .toList();
  
        notifyListeners();
      } catch (e) {
        debugPrint('Error loading degrees data: $e');
      }
    }

    Future<void> loadCoursesData() async {
      try {
        final String response = await rootBundle.loadString('assets/courses.json');
        final Map<String, dynamic> data = json.decode(response);
  
        _allCourses = (data['courses'] as List)
            .map((e) => Course.fromJson(e))
            .toList();
  
        notifyListeners();
      } catch (e) {
        debugPrint('Error loading courses data: $e');
      }
    }

    Future<CourseDetail?> loadCourseDetail(String courseId) async {
      if (_courseDetails.containsKey(courseId)) {
        return _courseDetails[courseId];
      }

      try {
        final String response = await rootBundle.loadString('assets/courses/${courseId.toLowerCase()}.json');
        final Map<String, dynamic> data = json.decode(response);
  
        final courseDetail = CourseDetail.fromJson(data);
        _courseDetails[courseId] = courseDetail;
  
        return courseDetail;
      } catch (e) {
        debugPrint('Error loading course detail for $courseId: $e');
        return null;
      }
    }

    Future<bool> courseDetailExists(String courseId) async {
      try {
        await rootBundle.loadString('assets/courses/${courseId.toLowerCase()}.json');
        return true;
      } catch (e) {
        return false;
      }
    }

    Course? getCourseById(String courseId) {
      try {
        return _allCourses.firstWhere((course) => course.courseId == courseId);
      } catch (e) {
        return null;
      }
    }
  }

lib/services/ai_service.dart: |
  import 'dart:convert';
  import 'dart:math';
  import 'package:flutter/foundation.dart';
  import '../models/course_detail_model.dart';

  class AIService {
    static final AIService _instance = AIService._internal();
    factory AIService() => _instance;
    AIService._internal();

    Future<String> generateAIResponse(String question, String context) async {
      // Simulate AI thinking time
      await Future.delayed(Duration(milliseconds: 500 + Random().nextInt(1500)));
  
      // Mock AI responses based on question keywords
      if (question.toLowerCase().contains('shader')) {
        return "A shader is a computer program that calculates rendering effects on graphics hardware. In computer graphics, shaders are used to determine the final surface properties of objects. There are different types of shaders including vertex shaders that process vertex data, fragment (or pixel) shaders that determine pixel colors, and geometry shaders that can generate additional geometry. Modern graphics pipelines rely heavily on programmable shaders to create realistic lighting, textures, and special effects.";
      } else if (question.toLowerCase().contains('algorithm')) {
        return "An algorithm is a step-by-step procedure for solving a problem or completing a task. In computer science, algorithms are fundamental building blocks that define how data is processed and manipulated. Key characteristics of good algorithms include correctness (producing the right output), efficiency (using minimal resources), and clarity (being easy to understand and implement). Algorithm analysis involves studying time and space complexity to understand performance characteristics.";
      } else if (question.toLowerCase().contains('optimization')) {
        return "Optimization in computer graphics involves improving performance by reducing computational overhead while maintaining visual quality. Common techniques include level-of-detail (LOD) systems, frustum culling, occlusion culling, texture compression, and efficient memory management. Performance profiling helps identify bottlenecks, and optimization strategies should balance visual fidelity with frame rate requirements.";
      } else {
        return "Based on the course material and context provided, this topic involves understanding fundamental concepts in computer graphics and game development. The key principles include mathematical foundations, practical implementation techniques, and optimization strategies that are essential for creating efficient and visually appealing applications.";
      }
    }

    Future<Map<String, dynamic>> evaluateResponse(
      String aiResponse, 
      String expectedAnswer, 
      List<Map<String, dynamic>> rubric
    ) async {
      // Simulate evaluation time
      await Future.delayed(Duration(milliseconds: 300 + Random().nextInt(700)));
  
      // Mock evaluation based on rubric
      final evaluation = <String, dynamic>{};
      int totalPoints = 0;
      int earnedPoints = 0;

      for (final criteria in rubric) {
        final key = criteria['key'] as String;
        final maxPoints = criteria['value'] as int;
  
        // Mock evaluation logic
        int points = 0;
        if (aiResponse.length > 50) {
          points = (maxPoints * 0.7).round(); // 70% for decent responses
          if (aiResponse.toLowerCase().contains(key.toLowerCase())) {
            points = (maxPoints * 0.9).round(); // 90% if contains key terms
          }
        } else {
          points = (maxPoints * 0.3).round(); // 30% for short responses
        }
  
        evaluation[key] = {
          'points_earned': points,
          'max_points': maxPoints,
          'feedback': _generateFeedback(key, points, maxPoints),
        };
  
        totalPoints += maxPoints;
        earnedPoints += points;
      }

      evaluation['total_score'] = {
        'earned': earnedPoints,
        'total': totalPoints,
        'percentage': ((earnedPoints / totalPoints) * 100).round(),
      };

      return evaluation;
    }

    String _generateFeedback(String criteria, int earned, int max) {
      final percentage = (earned / max);
  
      if (percentage >= 0.9) {
        return "Excellent understanding demonstrated for $criteria";
      } else if (percentage >= 0.7) {
        return "Good grasp of $criteria with room for minor improvements";
      } else if (percentage >= 0.5) {
        return "Adequate understanding of $criteria, consider expanding on key concepts";
      } else {
        return "Needs improvement in $criteria understanding";
      }
    }
  }

lib/screens/home/home_screen.dart: |
  import 'package:flutter/material.dart';
  import 'package:provider/provider.dart';
  import '../../services/data_service.dart';
  import 'widgets/university_header.dart';
  import 'widgets/degree_programs_grid.dart';
  import 'widgets/stats_section.dart';

  class HomeScreen extends StatefulWidget {
    const HomeScreen({super.key});

    @override
    State<HomeScreen> createState() => _HomeScreenState();
  }

  class _HomeScreenState extends State<HomeScreen> {
    @override
    void initState() {
    super.initState();
    WidgetsBinding.instance.addPostFrameCallback((_) {
      _loadData();
    });
  }

    Future<void> _loadData() async {
      final dataService = Provider.of<DataService>(context, listen: false);
      await dataService.loadDegreesData();
      await dataService.loadCoursesData();
    }

    @override
    Widget build(BuildContext context) {
      return Scaffold(
        body: Consumer<DataService>(
          builder: (context, dataService, child) {
            if (dataService.university == null) {
              return const Center(child: CircularProgressIndicator());
            }

            return CustomScrollView(
              slivers: [
                SliverAppBar(
                  expandedHeight: 300,
                  pinned: true,
                  flexibleSpace: FlexibleSpaceBar(
                    title: Text(
                      dataService.university!.name,
                      style: const TextStyle(
                        color: Colors.white,
                        fontWeight: FontWeight.bold,
                      ),
                    ),
                    background: Container(
                      decoration: const BoxDecoration(
                        gradient: LinearGradient(
                          begin: Alignment.topCenter,
                          end: Alignment.bottomCenter,
                          colors: [
                            Color(0xFF1E3A8A),
                            Color(0xFF3B82F6),
                          ],
                        ),
                      ),
                      child: const Stack(
                        children: [
                          Positioned(
                            right: -50,
                            top: 50,
                            child: Icon(
                              Icons.school,
                              size: 200,
                              color: Colors.white24,
                            ),
                          ),
                        ],
                      ),
                    ),
                  ),
                ),
                SliverToBoxAdapter(
                  child: Column(
                    children: [
                      UniversityHeader(university: dataService.university!),
                      const StatsSection(),
                      const SizedBox(height: 32),
                      DegreePrograms(degreePrograms: dataService.degreePrograms),
                    ],
                  ),
                ),
              ],
            );
          },
        ),
      );
    }
  }

