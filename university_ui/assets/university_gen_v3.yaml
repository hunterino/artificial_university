  import 'package:flutter/material.dart';
  import '../../../models/university_model.dart';

  class CourseList extends StatelessWidget {
    final List<Course> courses;
    final List<Course> allCourses;

    const CourseList({
      super.key,
      required this.courses,
      required this.allCourses,
    });

    @override
    Widget build(BuildContext context) {
      return Container(
        padding: const EdgeInsets.all(24),
        child: Column(
          crossAxisAlignment: CrossAxisAlignment.start,
          children: [
            Text(
              'Required Courses',
              style: Theme.of(context).textTheme.headlineSmall?.copyWith(
                fontWeight: FontWeight.bold,
                color: Theme.of(context).colorScheme.primary,
              ),
            ),
            const SizedBox(height: 16),
            Text(
              'Complete all ${courses.length} required courses to earn your degree.',
              style: Theme.of(context).textTheme.bodyMedium?.copyWith(
                color: Theme.of(context).colorScheme.onSurfaceVariant,
              ),
            ),
            const SizedBox(height: 24),
            ListView.builder(
              shrinkWrap: true,
              physics: const NeverScrollableScrollPhysics(),
              itemCount: courses.length,
              itemBuilder: (context, index) {
                final course = courses[index];
                final detailedCourse = _findDetailedCourse(course.courseId);
                return CourseCard(
                  course: course,
                  detailedCourse: detailedCourse,
                );
              },
            ),
          ],
        ),
      );
    }

    Course? _findDetailedCourse(String courseId) {
      try {
        return allCourses.firstWhere((course) => course.courseId == courseId);
      } catch (e) {
        return null;
      }
    }
  }

  class CourseCard extends StatelessWidget {
    final Course course;
    final Course? detailedCourse;

    const CourseCard({
      super.key,
      required this.course,
      this.detailedCourse,
    });

    @override
    Widget build(BuildContext context) {
      final description = detailedCourse?.description ?? 'Course description not available';
      final objectives = detailedCourse?.learningObjectives ?? [];
      final materials = detailedCourse?.coveredMaterials ?? [];

      return Card(
        margin: const EdgeInsets.only(bottom: 16),
        elevation: 2,
        child: InkWell(
          onTap: () {
            Navigator.pushNamed(
              context,
              '/course-detail',
              arguments: course.courseId,
            );
          },
          borderRadius: BorderRadius.circular(12),
          child: Padding(
            padding: const EdgeInsets.all(20),
            child: Column(
              crossAxisAlignment: CrossAxisAlignment.start,
              children: [
                Row(
                  children: [
                    Container(
                      padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 6),
                      decoration: BoxDecoration(
                        color: Theme.of(context).colorScheme.primary,
                        borderRadius: BorderRadius.circular(16),
                      ),
                      child: Text(
                        course.courseId,
                        style: Theme.of(context).textTheme.labelMedium?.copyWith(
                          color: Colors.white,
                          fontWeight: FontWeight.bold,
                        ),
                      ),
                    ),
                    const SizedBox(width: 12),
                    Container(
                      padding: const EdgeInsets.symmetric(horizontal: 8, vertical: 4),
                      decoration: BoxDecoration(
                        color: Theme.of(context).colorScheme.surfaceVariant,
                        borderRadius: BorderRadius.circular(12),
                      ),
                      child: Row(
                        mainAxisSize: MainAxisSize.min,
                        children: [
                          const Icon(Icons.schedule, size: 14),
                          const SizedBox(width: 4),
                          Text(
                            '${course.creditHours} Credits',
                            style: Theme.of(context).textTheme.labelSmall,
                          ),
                        ],
                      ),
                    ),
                    const Spacer(),
                    const Icon(Icons.arrow_forward_ios, size: 16),
                  ],
                ),
                const SizedBox(height: 16),
                Text(
                  course.title,
                  style: Theme.of(context).textTheme.titleLarge?.copyWith(
                    fontWeight: FontWeight.bold,
                  ),
                ),
                const SizedBox(height: 12),
                Text(
                  description,
                  style: Theme.of(context).textTheme.bodyMedium?.copyWith(
                    color: Theme.of(context).colorScheme.onSurfaceVariant,
                    height: 1.5,
                  ),
                  maxLines: 3,
                  overflow: TextOverflow.ellipsis,
                ),
                if (objectives.isNotEmpty) ...[
                  const SizedBox(height: 16),
                  ExpansionTile(
                    title: Text(
                      'Learning Objectives',
                      style: Theme.of(context).textTheme.titleMedium?.copyWith(
                        fontWeight: FontWeight.w600,
                      ),
                    ),
                    children: [
                      ...objectives.take(3).map((objective) => ListTile(
                        leading: const Icon(Icons.check_circle_outline, size: 20),
                        title: Text(
                          objective,
                          style: Theme.of(context).textTheme.bodySmall,
