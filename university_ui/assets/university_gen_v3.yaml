  import 'package:flutter/material.dart';
  import '../../models/course_detail_model.dart';
  import 'widgets/course_overview.dart';
  import 'widgets/assessment_selector.dart';
  import 'widgets/ai_chat_interface.dart';

  class TakeCourseScreen extends StatefulWidget {
    const TakeCourseScreen({super.key});

    @override
    State<TakeCourseScreen> createState() => _TakeCourseScreenState();
  }

  class _TakeCourseScreenState extends State<TakeCourseScreen> {
    CourseDetail? courseDetail;
    Quiz? selectedQuiz;
    MajorAssignment? selectedAssignment;
    QuizQuestion? currentQuestion;
    int currentQuestionIndex = 0;

    @override
    void didChangeDependencies() {
      super.didChangeDependencies();
      final detail = ModalRoute.of(context)?.settings.arguments as CourseDetail?;
      if (detail != null && courseDetail != detail) {
        setState(() {
          courseDetail = detail;
        });
      }
    }

    void onQuizSelected(Quiz quiz) {
      setState(() {
        selectedQuiz = quiz;
        selectedAssignment = null;
        currentQuestion = quiz.questions.isNotEmpty ? quiz.questions[0] : null;
        currentQuestionIndex = 0;
      });
    }

    void onAssignmentSelected(MajorAssignment assignment) {
      setState(() {
        selectedAssignment = assignment;
        selectedQuiz = null;
        currentQuestion = null;
      });
    }

    void onNextQuestion() {
      if (selectedQuiz != null && currentQuestionIndex < selectedQuiz!.questions.length - 1) {
        setState(() {
          currentQuestionIndex++;
          currentQuestion = selectedQuiz!.questions[currentQuestionIndex];
        });
      }
    }

    void onPreviousQuestion() {
      if (currentQuestionIndex > 0) {
        setState(() {
          currentQuestionIndex--;
          currentQuestion = selectedQuiz!.questions[currentQuestionIndex];
        });
      }
    }

    void resetSelection() {
      setState(() {
        selectedQuiz = null;
        selectedAssignment = null;
        currentQuestion = null;
        currentQuestionIndex = 0;
      });
    }

    @override
    Widget build(BuildContext context) {
      if (courseDetail == null) {
        return Scaffold(
          appBar: AppBar(title: const Text('AI Takes Course')),
          body: const Center(
            child: Text('No course data available'),
          ),
        );
      }

      return Scaffold(
        appBar: AppBar(
          title: Text('AI Takes ${courseDetail!.courseInfo.courseId}'),
          backgroundColor: Theme.of(context).colorScheme.primary,
          foregroundColor: Colors.white,
          actions: [
            if (selectedQuiz != null || selectedAssignment != null)
              IconButton(
                onPressed: resetSelection,
                icon: const Icon(Icons.refresh),
                tooltip: 'Reset Selection',
              ),
          ],
        ),
        body: Column(
          children: [
            if (selectedQuiz == null && selectedAssignment == null) ...[
              Expanded(
                flex: 1,
                child: CourseOverview(courseDetail: courseDetail!),
              ),
              Expanded(
                flex: 2,
                child: AssessmentSelector(
                  assessments: courseDetail!.assessments,
                  onQuizSelected: onQuizSelected,
                  onAssignmentSelected: onAssignmentSelected,
                ),
              ),
            ] else ...[
              Container(
                padding: const EdgeInsets.all(16),
                decoration: BoxDecoration(
                  color: Theme.of(context).colorScheme.surfaceVariant,
                  border: Border(
                    bottom: BorderSide(
                      color: Theme.of(context).colorScheme.outline,
                    ),
                  ),
                ),
                child: Row(
                  children: [
                    Expanded(
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Text(
                            selectedQuiz != null 
                                ? 'Quiz ${selectedQuiz!.quiz}: ${selectedQuiz!.topic}'
                                : selectedAssignment!.title,
                            style: Theme.of(context).textTheme.titleMedium?.copyWith(
                              fontWeight: FontWeight.bold,
                            ),
                          ),
                          if (selectedQuiz != null)
                            Text(
                              'Question ${currentQuestionIndex + 1} of ${selectedQuiz!.questions.length}',
                              style: Theme.of(context).textTheme.bodySmall?.copyWith(
                                color: Theme.of(context).colorScheme.onSurfaceVariant,
                              ),
                            ),
                        ],
                      ),
                    ),
                    if (selectedQuiz != null && selectedQuiz!.questions.length > 1) ...[
                      IconButton(
                        onPressed: currentQuestionIndex > 0 ? onPreviousQuestion : null,
                        icon: const Icon(Icons.arrow_back),
                      ),
                      IconButton(
                        onPressed: currentQuestionIndex < selectedQuiz!.questions.length - 1 
                            ? onNextQuestion 
                            : null,
                        icon: const Icon(Icons.arrow_forward),
                      ),
                    ],
                  ],
                ),
              ),
              Expanded(
                child: AiChatInterface(
                  quiz: selectedQuiz,
                  assignment: selectedAssignment,
                  currentQuestion: currentQuestion,
                ),
              ),
            ],
          ],
        ),
      );
    }
  }

