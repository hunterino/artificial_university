pubspec.yaml: |
  name: artificial_university
  description: AI-Powered Education Platform
  version: 1.0.0+1

  environment:
    sdk: '>=3.0.0 <4.0.0'
    flutter: ">=3.10.0"

  dependencies:
    flutter:
      sdk: flutter
    cupertino_icons: ^1.0.2
    http: ^1.1.0
    provider: ^6.0.5
    flutter_markdown: ^0.6.18
    cached_network_image: ^3.3.0

  dev_dependencies:
    flutter_test:
      sdk: flutter
    flutter_lints: ^2.0.0

  flutter:
    uses-material-design: true
    assets:
      - assets/
      - assets/courses/
      - assets/images/

lib/main.dart: |
  import 'package:flutter/material.dart';
  import 'package:provider/provider.dart';
  import 'services/data_service.dart';
  import 'screens/home/home_screen.dart';
  import 'screens/degrees/degrees_screen.dart';
  import 'screens/courses/course_detail_screen.dart';
  import 'screens/take_course/take_course_screen.dart';

  void main() {
    runApp(const ArtificialUniversityApp());
  }

  class ArtificialUniversityApp extends StatelessWidget {
    const ArtificialUniversityApp({super.key});

    @override
    Widget build(BuildContext context) {
      return ChangeNotifierProvider(
        create: (context) => DataService(),
        child: MaterialApp(
          title: 'Artificial University',
          theme: ThemeData(
            colorScheme: ColorScheme.fromSeed(
              seedColor: const Color(0xFF1E3A8A),
              brightness: Brightness.light,
            ),
            useMaterial3: true,
            fontFamily: 'Inter',
            appBarTheme: const AppBarTheme(
              centerTitle: true,
              elevation: 0,
            ),
          ),
          home: const HomeScreen(),
          routes: {
            '/degrees': (context) => const DegreesScreen(),
            '/course-detail': (context) => const CourseDetailScreen(),
            '/take-course': (context) => const TakeCourseScreen(),
          },
        ),
      );
    }
  }

lib/models/university_model.dart: |
  class University {
    final String name;
    final String mission;
    final String accreditation;
    final int established;
    final String learningModel;
    final String assessmentMethod;

    University({
      required this.name,
      required this.mission,
      required this.accreditation,
      required this.established,
      required this.learningModel,
      required this.assessmentMethod,
    });

    factory University.fromJson(Map<String, dynamic> json) {
      return University(
        name: json['name'],
        mission: json['mission'],
        accreditation: json['accreditation'],
        established: json['established'],
        learningModel: json['learning_model'],
        assessmentMethod: json['assessment_method'],
      );
    }
  }

  class GeneralEducationRequirements {
    final int totalCredits;
    final List<CategoryRequirement> categories;

    GeneralEducationRequirements({
      required this.totalCredits,
      required this.categories,
    });

    factory GeneralEducationRequirements.fromJson(Map<String, dynamic> json) {
      return GeneralEducationRequirements(
        totalCredits: json['total_credits'],
        categories: (json['categories'] as List)
            .map((e) => CategoryRequirement.fromJson(e))
            .toList(),
      );
    }
  }

  class CategoryRequirement {
    final String category;
    final int credits;
    final List<Course> courses;

    CategoryRequirement({
      required this.category,
      required this.credits,
      required this.courses,
    });

    factory CategoryRequirement.fromJson(Map<String, dynamic> json) {
      return CategoryRequirement(
        category: json['category'],
        credits: json['credits'],
        courses: (json['courses'] as List)
            .map((e) => Course.fromJson(e))
            .toList(),
      );
    }
  }

  class DegreeProgram {
    final String degreeId;
    final String title;
    final String duration;
    final int totalCredits;
    final String description;
    final int majorCredits;
    final List<Course> requiredCourses;

    DegreeProgram({
      required this.degreeId,
      required this.title,
      required this.duration,
      required this.totalCredits,
      required this.description,
      required this.majorCredits,
      required this.requiredCourses,
    });

    factory DegreeProgram.fromJson(Map<String, dynamic> json) {
      return DegreeProgram(
        degreeId: json['degree_id'],
        title: json['title'],
        duration: json['duration'],
        totalCredits: json['total_credits'],
        description: json['description'],
        majorCredits: json['major_credits'],
        requiredCourses: (json['required_courses'] as List)
            .map((e) => Course.fromJson(e))
            .toList(),
      );
    }
  }

  class Course {
    final String courseId;
    final String title;
    final int creditHours;
    final String? description;
    final List<String>? learningObjectives;
    final List<String>? coveredMaterials;

    Course({
      required this.courseId,
      required this.title,
      required this.creditHours,
      this.description,
      this.learningObjectives,
      this.coveredMaterials,
    });

    factory Course.fromJson(Map<String, dynamic> json) {
      return Course(
        courseId: json['course_id'],
        title: json['title'],
        creditHours: json['credit_hours'],
        description: json['description'],
        learningObjectives: json['learning_objectives']?.cast<String>(),
        coveredMaterials: json['covered_materials']?.cast<String>(),
      );
    }
  }

lib/models/course_detail_model.dart: |
  class CourseDetail {
    final CourseInfo courseInfo;
    final List<ClassSession> classSchedule;
    final Assessments assessments;
    final GradingBreakdown gradingBreakdown;
    final CoursePolicies coursePolicies;

    CourseDetail({
      required this.courseInfo,
      required this.classSchedule,
      required this.assessments,
      required this.gradingBreakdown,
      required this.coursePolicies,
    });

    factory CourseDetail.fromJson(Map<String, dynamic> json) {
      return CourseDetail(
        courseInfo: CourseInfo.fromJson(json['course_info']),
        classSchedule: (json['class_schedule'] as List)
            .map((e) => ClassSession.fromJson(e))
            .toList(),
        assessments: Assessments.fromJson(json['assessments']),
        gradingBreakdown: GradingBreakdown.fromJson(json['grading_breakdown']),
        coursePolicies: CoursePolicies.fromJson(json['course_policies']),
      );
    }
  }

  class CourseInfo {
    final String courseId;
    final String title;
    final int creditHours;
    final String duration;
    final String meetingSchedule;
    final List<String> prerequisites;

    CourseInfo({
      required this.courseId,
      required this.title,
      required this.creditHours,
      required this.duration,
      required this.meetingSchedule,
      required this.prerequisites,
    });

    factory CourseInfo.fromJson(Map<String, dynamic> json) {
      return CourseInfo(
        courseId: json['course_id'],
        title: json['title'],
        creditHours: json['credit_hours'],
        duration: json['duration'],
        meetingSchedule: json['meeting_schedule'],
        prerequisites: (json['prerequisites'] as List).cast<String>(),
      );
    }
  }

  class ClassSession {
    final int weekNumber;
    final int sessionNumber;
    final String date;
    final String topic;
    final String duration;
    final List<String> learningObjectives;
    final List<String> readings;
    final LectureNotes lectureNotes;

    ClassSession({
      required this.weekNumber,
      required this.sessionNumber,
      required this.date,
      required this.topic,
      required this.duration,
      required this.learningObjectives,
      required this.readings,
      required this.lectureNotes,
    });

    factory ClassSession.fromJson(Map<String, dynamic> json) {
      return ClassSession(
        weekNumber: json['week_number'],
        sessionNumber: json['session_number'],
        date: json['date'],
        topic: json['topic'],
        duration: json['duration'],
        learningObjectives: (json['learning_objectives'] as List).cast<String>(),
        readings: (json['readings'] as List).cast<String>(),
        lectureNotes: LectureNotes.fromJson(json['lecture_notes']),
      );
    }
  }

  class LectureNotes {
    final String introduction;
    final List<String> keyConcepts;
    final String demonstration;
    final List<String> setupRequirements;
    final List<Map<String, String>> review;

    LectureNotes({
      required this.introduction,
      required this.keyConcepts,
      required this.demonstration,
      required this.setupRequirements,
      required this.review,
    });

    factory LectureNotes.fromJson(Map<String, dynamic> json) {
      return LectureNotes(
        introduction: json['introduction'],
        keyConcepts: (json['key_concepts'] as List).cast<String>(),
        demonstration: json['demonstration'],
        setupRequirements: (json['setup_requirements'] as List).cast<String>(),
        review: (json['review'] as List)
            .map((e) => Map<String, String>.from(e))
            .toList(),
      );
    }
  }

  class Assessments {
    final List<Quiz> quizzes;
    final List<MajorAssignment> majorAssignments;

    Assessments({
      required this.quizzes,
      required this.majorAssignments,
    });

