<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bg)"/>
  <!-- Graduation cap -->
  <g fill="white">
    <!-- Cap board (diamond shape) -->
    <polygon points="512,240 780,370 512,480 244,370"/>
    <!-- Cap top surface shadow -->
    <polygon points="512,240 780,370 512,480 244,370" fill="white" opacity="0.9"/>
    <!-- Button on top -->
    <circle cx="512" cy="345" r="18" fill="white"/>
    <!-- Tassel string -->
    <line x1="780" y1="370" x2="780" y2="480" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <!-- Tassel end -->
    <rect x="768" y="480" width="24" height="40" rx="6" fill="white"/>
    <!-- Cap base (band) -->
    <path d="M340 370 L512 450 L684 370 L684 400 L512 480 L340 400 Z" fill="white" opacity="0.7"/>
  </g>
  <!-- Open book -->
  <g fill="white">
    <!-- Left page -->
    <path d="M512 590 L300 570 C280 568 270 575 270 590 L270 740 C270 755 280 765 300 762 L512 740 Z" fill="white" opacity="0.9"/>
    <!-- Right page -->
    <path d="M512 590 L724 570 C744 568 754 575 754 590 L754 740 C754 755 744 765 724 762 L512 740 Z" fill="white" opacity="0.9"/>
    <!-- Book spine -->
    <line x1="512" y1="580" x2="512" y2="750" stroke="#4338CA" stroke-width="6" opacity="0.5"/>
    <!-- Left page lines -->
    <line x1="320" y1="620" x2="490" y2="610" stroke="#4338CA" stroke-width="5" opacity="0.3" stroke-linecap="round"/>
    <line x1="320" y1="655" x2="490" y2="645" stroke="#4338CA" stroke-width="5" opacity="0.3" stroke-linecap="round"/>
    <line x1="320" y1="690" x2="490" y2="680" stroke="#4338CA" stroke-width="5" opacity="0.3" stroke-linecap="round"/>
    <line x1="320" y1="725" x2="460" y2="718" stroke="#4338CA" stroke-width="5" opacity="0.3" stroke-linecap="round"/>
    <!-- Right page lines -->
    <line x1="534" y1="610" x2="704" y2="620" stroke="#4338CA" stroke-width="5" opacity="0.3" stroke-linecap="round"/>
    <line x1="534" y1="645" x2="704" y2="655" stroke="#4338CA" stroke-width="5" opacity="0.3" stroke-linecap="round"/>
    <line x1="534" y1="680" x2="704" y2="690" stroke="#4338CA" stroke-width="5" opacity="0.3" stroke-linecap="round"/>
    <line x1="534" y1="718" x2="670" y2="725" stroke="#4338CA" stroke-width="5" opacity="0.3" stroke-linecap="round"/>
  </g>
</svg>
