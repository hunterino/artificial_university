src/App.tsx: |
  import { BrowserRouter as Router, Routes, Route } from 'react-router-dom'
  import { Navigation } from './components/Navigation'
  import { Footer } from './components/Footer'
  import { HomePage } from './modules/home/HomePage'
  import { DegreePage } from './modules/degrees/DegreePage'
  import { DegreeDetailPage } from './modules/degrees/DegreeDetailPage'
  import { CourseDetailPage } from './modules/courses/CourseDetailPage'
  import { TakeCoursePage } from './modules/take_course/TakeCoursePage'
  import './App.css'

  function App() {
    return (
      <Router>
        <div className="app">
          <Navigation />
          <main className="main-content">
            <Routes>
              <Route path="/" element={<HomePage />} />
              <Route path="/degrees" element={<DegreePage />} />
              <Route path="/degrees/:degreeId" element={<DegreeDetailPage />} />
              <Route path="/courses/:courseId" element={<CourseDetailPage />} />
              <Route path="/take-course/:courseId" element={<TakeCoursePage />} />
            </Routes>
          </main>
          <Footer />
        </div>
      </Router>
    )
  }

  export default App

src/index.css: |
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    line-height: 1.6;
    color: #333;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
  }

  .app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .main-content {
    flex: 1;
    padding: 2rem 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  .card {
    background: white;
