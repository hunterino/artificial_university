  import { useState, useEffect } from 'react';
  import { useParams, Link } from 'react-router-dom';
  import { BookOpen, Clock, Target, List, ArrowLeft, Bot } from 'lucide-react';
  import { CoursesData, CourseDetail } from '@/types';
  import { loadCoursesData, checkClassDataExists } from '@/utils/dataLoader';
  import { LoadingSpinner } from '@/components/LoadingSpinner';

  export const CourseDetailPage = () => {
    const { courseId } = useParams<{ courseId: string }>();
    const [data, setData] = useState<CoursesData | null>(null);
    const [course, setCourse] = useState<CourseDetail | null>(null);
    const [hasClassData, setHasClassData] = useState(false);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
      const fetchData = async () => {
        try {
          const coursesData = await loadCoursesData();
          setData(coursesData);
  
          // Find the course in any category
          let foundCourse: CourseDetail | null = null;
          for (const category of Object.values(coursesData.courses)) {
            const course = category.find(c => c.course_id === courseId);
            if (course) {
              foundCourse = course;
              break;
            }
          }
  
          setCourse(foundCourse);
  
          // Check if detailed class data exists
          if (courseId) {
            const classDataExists = await checkClassDataExists(courseId);
            setHasClassData(classDataExists);
          }
        } catch (error) {
          console.error('Error loading data:', error);
        } finally {
          setLoading(false);
        }
      };
  
      fetchData();
    }, [courseId]);

    if (loading) {
      return <LoadingSpinner />;
    }

    if (!data || !course) {
      return (
        <div className="container">
          <div className="card">
            <h2>Course not found</h2>
            <p>The requested course could not be found.</p>
            <Link to="/degrees" className="btn">
              <ArrowLeft size={18} />
              Back to Degrees
            </Link>
          </div>
        </div>
      );
    }

    return (
      <div className="container">
        <div className="card">
          <button onClick={() => window.history.back()} className="btn" style={{ marginBottom: '2rem' }}>
            <ArrowLeft size={18} />
            Back
          </button>
  
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '2rem' }}>
            <div>
              <h1>{course.course_id}: {course.title}</h1>
              <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', marginTop: '1rem' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                  <Clock size={18} style={{ color: '#667eea' }} />
                  <span><strong>{course.credit_hours} Credit Hours</strong></span>
                </div>
              </div>
            </div>
  
            {hasClassData ? (
              <Link to={`/take-course/${courseId}`} className="btn" style={{ fontSize: '1.1rem' }}>
                <Bot size={20} />
                Have AI Take This Course
              </Link>
            ) : (
              <button className="btn" disabled style={{ fontSize: '1.1rem' }}>
                <Bot size={20} />
                AI Course Not Available
              </button>
            )}
          </div>
        </div>

        <div className="card">
          <h2>Course Description</h2>
          <p style={{ fontSize: '1.1rem', lineHeight: '1.8' }}>{course.description}</p>
        </div>

        <div className="grid grid-2">
          <div className="card">
            <h2>
              <Target size={24} style={{ marginRight: '0.5rem', color: '#667eea' }} />
              Learning Objectives
            </h2>
            <ul style={{ paddingLeft: '1.5rem' }}>
              {course.learning_objectives.map((objective, index) => (
                <li key={index} style={{ marginBottom: '0.75rem', lineHeight: '1.6' }}>
                  {objective}
                </li>
              ))}
            </ul>
          </div>

          <div className="card">
            <h2>
              <List size={24} style={{ marginRight: '0.5rem', color: '#667eea' }} />
              Covered Materials
            </h2>
            <ul style={{ paddingLeft: '1.5rem' }}>
              {course.covered_materials.map((material, index) => (
                <li key={index} style={{ marginBottom: '0.75rem', lineHeight: '1.6' }}>
                  {material}
                </li>
              ))}
            </ul>
          </div>
