                  <h3>{degree.title}</h3>
                  <p>{degree.description.substring(0, 120)}...</p>
                  <div style={{ marginTop: '1rem', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ color: '#667eea', fontWeight: '600' }}>{degree.duration}</span>
                    <span style={{ color: '#667eea', fontWeight: '600' }}>{degree.total_credits} Credits</span>
                  </div>
                </Link>
              ))}
            </div>
            <div style={{ textAlign: 'center', marginTop: '2rem' }}>
              <Link to="/degrees" className="btn">
                View All Degree Programs
              </Link>
            </div>
          </div>

          {/* General Education Requirements */}
          <div className="card">
            <h2>General Education Foundation</h2>
            <p>All degree programs include {data.general_education_requirements.total_credits} credits of general education coursework across these essential areas:</p>
            <div className="grid grid-2">
              {data.general_education_requirements.categories.map((category) => (
                <div key={category.category} className="course-item">
                  <h3>{category.category}</h3>
                  <p><strong>{category.credits} Credits</strong></p>
                  <p>{category.courses.length} courses covering foundational knowledge and skills</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  };

