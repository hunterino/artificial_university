src/modules/home/HomePage.tsx: |
  import { useState, useEffect } from 'react';
  import { Link } from 'react-router-dom';
  import { Users, Award, Globe, Zap, BookOpen, Brain } from 'lucide-react';
  import { DegreesData } from '@/types';
  import { loadDegreesData } from '@/utils/dataLoader';
  import { LoadingSpinner } from '@/components/LoadingSpinner';

  export const HomePage = () => {
    const [data, setData] = useState<DegreesData | null>(null);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
      const fetchData = async () => {
        try {
          const degreesData = await loadDegreesData();
          setData(degreesData);
        } catch (error) {
          console.error('Error loading data:', error);
        } finally {
          setLoading(false);
        }
      };
  
      fetchData();
    }, []);

    if (loading) {
      return <LoadingSpinner />;
    }

    if (!data) {
      return (
        <div className="container">
          <div className="card">
            <h2>Error loading university data</h2>
            <p>Please try refreshing the page.</p>
          </div>
        </div>
      );
    }

    return (
      <div>
        {/* Hero Section */}
        <section className="hero-section">
          <div className="container">
            <div className="hero-content">
              <h1>{data.university.name}</h1>
              <p>{data.university.mission}</p>
              <div style={{ marginTop: '2rem' }}>
                <Link to="/degrees" className="btn" style={{ fontSize: '1.1rem', padding: '1rem 2rem' }}>
                  <BookOpen size={20} />
                  Explore Degree Programs
                </Link>
              </div>
            </div>
          </div>
        </section>

        <div className="container">
          {/* University Info */}
          <div className="card">
            <div className="grid grid-2">
              <div>
                <h2>About Our University</h2>
                <p><strong>Established:</strong> {data.university.established}</p>
                <p><strong>Accreditation:</strong> {data.university.accreditation}</p>
                <p><strong>Learning Model:</strong> {data.university.learning_model}</p>
                <p><strong>Assessment Method:</strong> {data.university.assessment_method}</p>
              </div>
              <div className="campus-illustration">
                <Brain size={64} style={{ marginBottom: '1rem' }} />
                <h3>Virtual AI Campus</h3>
                <p>Experience the future of education in our fully digital learning environment powered by artificial intelligence.</p>
              </div>
            </div>
          </div>

          {/* Student Body Stats */}
          <div className="card">
            <h2>Student Body & Innovation</h2>
            <div className="student-body-stats">
              <div className="stat-card">
                <Users size={32} style={{ color: '#667eea', marginBottom: '0.5rem' }} />
                <div className="stat-number">10,000+</div>
                <div>Active AI Learners</div>
              </div>
              <div className="stat-card">
                <Award size={32} style={{ color: '#667eea', marginBottom: '0.5rem' }} />
                <div className="stat-number">12</div>
                <div>Degree Programs</div>
              </div>
              <div className="stat-card">
                <Globe size={32} style={{ color: '#667eea', marginBottom: '0.5rem' }} />
                <div className="stat-number">50+</div>
                <div>Countries Served</div>
              </div>
              <div className="stat-card">
                <Zap size={32} style={{ color: '#667eea', marginBottom: '0.5rem' }} />
                <div className="stat-number">98%</div>
                <div>Satisfaction Rate</div>
              </div>
            </div>
          </div>

