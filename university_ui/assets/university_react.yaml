README.md: |
  # Artificial University - AI-Powered Education Platform

  A React + TypeScript application showcasing an innovative AI-powered university with interactive course experiences.

  ## Features

  - **University Overview**: Browse degree programs and course catalogs
  - **Degree Programs**: Detailed curriculum and course requirements
  - **Course Details**: Comprehensive course descriptions with learning objectives
  - **AI-Powered Learning**: Interactive courses with AI-assisted quizzes and assignments
  - **Claude AI Integration**: Automated grading and feedback system

  ## Prerequisites

  - Node.js 18+ and npm
  - Claude AI API key (for AI grading functionality)

  ## Setup

  1. Clone the repository
  2. Install dependencies:
     ```bash
     npm install
     ```
  3. Copy `.env.example` to `.env` and add your Claude AI API key:
     ```bash
     cp .env.example .env
     ```
  4. Start the development server:
     ```bash
     npm run dev
     ```

  ## Project Structure
