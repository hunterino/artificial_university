    const [degree, setDegree] = useState<DegreeProgram | null>(null);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
      const fetchData = async () => {
        try {
          const degreesData = await loadDegreesData();
          setData(degreesData);
  
          const foundDegree = degreesData.degree_programs.find(d => d.degree_id === degreeId);
          setDegree(foundDegree || null);
        } catch (error) {
          console.error('Error loading data:', error);
