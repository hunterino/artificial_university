  export interface DegreesData {
    university: University;
    general_education_requirements: GeneralEducationRequirements;
    degree_programs: DegreeProgram[];
  }

  export interface CourseDetail {
    course_id: string;
    title: string;
    credit_hours: number;
    description: string;
    learning_objectives: string[];
    covered_materials: string[];
  }

  export interface CoursesData {
    courses: {
      [category: string]: CourseDetail[];
    };
  }

  export interface ClassSession {
    week_number: number;
    session_number: number;
    date: string;
    topic: string;
    duration: string;
    learning_objectives: string[];
    readings: string[];
    lecture_notes: {
      introduction: string;
      key_concepts: string[];
      demonstration: string;
      setup_requirements: string[];
      review: {
        key: string;
        value: string;
      }[];
    };
  }

  export interface QuizQuestion {
    question: string;
    type: string;
    points: number;
    answer: string;
    rubric: {
      key: string;
      value: number;
    }[];
  }

  export interface Quiz {
    quiz: number;
    week: number;
    topic: string;
    duration: string;
    questions: QuizQuestion[];
    total_points: number;
  }

  export interface Assignment {
    assignment: number;
    title: string;
    week_assigned: number;
    week_due: number;
    points: number;
    description: string;
    objectives: string[];
    requirements: any;
    deliverables: string[];
    grading_rubric: any;
    rubric: any[];
  }

  export interface ClassData {
    course_info: {
      course_id: string;
      title: string;
      credit_hours: number;
      duration: string;
      meeting_schedule: string;
      prerequisites: string[];
    };
    class_schedule: ClassSession[];
    assessments: {
      quizzes: Quiz[];
      major_assignments: Assignment[];
    };
  }

  export interface AIResponse {
    answer: string;
    score: number;
    feedback: string;
    total_points: number;
  }

src/utils/dataLoader.ts: |
  import { DegreesData, CoursesData, ClassData } from '@/types';

  export const loadDegreesData = async (): Promise<DegreesData> => {
    const response = await fetch('/assets/degrees.json');
    if (!response.ok) {
      throw new Error('Failed to load degrees data');
    }
    return response.json();
  };

  export const loadCoursesData = async (): Promise<CoursesData> => {
    const response = await fetch('/assets/courses.json');
    if (!response.ok) {
      throw new Error('Failed to load courses data');
    }
    return response.json();
  };

  export const loadClassData = async (courseId: string): Promise<ClassData | null> => {
    try {
      const response = await fetch(`/assets/courses/${courseId.toLowerCase()}.json`);
      if (!response.ok) {
        return null;
      }
      return response.json();
    } catch (error) {
      return null;
    }
  };

  export const checkClassDataExists = async (courseId: string): Promise<boolean> => {
    try {
      const response = await fetch(`/assets/courses/${courseId.toLowerCase()}.json`, { method: 'HEAD' });
      return response.ok;
    } catch (error) {
      return false;
    }
  };

src/utils/claudeApi.ts: |
  export interface ClaudeResponse {
    answer: string;
    score: number;
    feedback: string;
    total_points: number;
  }

  const CLAUDE_API_KEY = import.meta.env.VITE_CLAUDE_API_KEY;

  export class ClaudeApiClient {
    private apiKey: string;

    constructor(apiKey?: string) {
      this.apiKey = apiKey || CLAUDE_API_KEY || '';
    }

    async askQuestion(question: string, context?: string): Promise<string> {
      if (!this.apiKey) {
        return "Claude API key not configured. Please set VITE_CLAUDE_API_KEY environment variable.";
      }

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${this.apiKey}`,
            'anthropic-version': '2023-06-01',
          },
          body: JSON.stringify({
            model: 'claude-3-sonnet-20240229',
            max_tokens: 1000,
            messages: [
              {
                role: 'user',
                content: context ? `${context}\n\nQuestion: ${question}` : question
              }
            ]
          })
        });

        if (!response.ok) {
          throw new Error(`Claude API error: ${response.statusText}`);
        }

        const data = await response.json();
        return data.content[0].text;
      } catch (error) {
        console.error('Error calling Claude API:', error);
        return `Error: Unable to get response from Claude API. ${error instanceof Error ? error.message : 'Unknown error'}`;
      }
    }

    async gradeAnswer(
      question: string,
      studentAnswer: string,
      correctAnswer: string,
      rubric: { key: string; value: number }[],
      totalPoints: number
    ): Promise<ClaudeResponse> {
      if (!this.apiKey) {
        return {
          answer: studentAnswer,
          score: 0,
          feedback: "Claude API key not configured. Cannot grade automatically.",
          total_points: totalPoints
        };
      }

      const gradingPrompt = `
        Please grade this student's answer using the provided rubric.

        Question: ${question}
        Correct Answer: ${correctAnswer}
        Student Answer: ${studentAnswer}
  
        Grading Rubric:
        ${rubric.map(item => `- ${item.key}: ${item.value} points`).join('\n')}
        Total Points: ${totalPoints}

        Please provide:
        1. A score out of ${totalPoints} points
        2. Detailed feedback explaining the grade
        3. Areas for improvement

        Format your response as JSON:
        {
          "score": <number>,
          "feedback": "<detailed feedback>"
        }
      `;

      try {
        const response = await this.askQuestion(gradingPrompt);
  
        // Try to parse JSON response
        try {
          const gradingResult = JSON.parse(response);
          return {
            answer: studentAnswer,
            score: gradingResult.score || 0,
            feedback: gradingResult.feedback || response,
            total_points: totalPoints
          };
        } catch (parseError) {
          // If JSON parsing fails, extract score manually and use full response as feedback
          const scoreMatch = response.match(/score[\":\s]*(\d+)/i);
          const extractedScore = scoreMatch ? parseInt(scoreMatch[1]) : 0;
  
          return {
            answer: studentAnswer,
            score: extractedScore,
            feedback: response,
            total_points: totalPoints
          };
        }
      } catch (error) {
        return {
          answer: studentAnswer,
          score: 0,
          feedback: `Error grading answer: ${error instanceof Error ? error.message : 'Unknown error'}`,
          total_points: totalPoints
        };
      }
    }
  }

  export const claudeApi = new ClaudeApiClient();

