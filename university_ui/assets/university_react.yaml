  import { useState, useEffect } from 'react';
  import { useParams, Link } from 'react-router-dom';
  import { ArrowLeft, Calendar, FileText, HelpCircle, Bot, Clock } from 'lucide-react';
  import { ClassData, Quiz, Assignment } from '@/types';
  import { loadClassData } from '@/utils/dataLoader';
  import { LoadingSpinner } from '@/components/LoadingSpinner';
  import { QuizInterface } from './components/QuizInterface';
  import { AssignmentInterface } from './components/AssignmentInterface';

  export const TakeCoursePage = () => {
    const { courseId } = useParams<{ courseId: string }>();
    const [classData, setClassData] = useState<ClassData | null>(null);
    const [loading, setLoading] = useState(true);
    const [selectedQuiz, setSelectedQuiz] = useState<Quiz | null>(null);
    const [selectedAssignment, setSelectedAssignment] = useState<Assignment | null>(null);
    const [activeTab, setActiveTab] = useState<'schedule' | 'quiz' | 'assignment'>('schedule');

    useEffect(() => {
      const fetchData = async () => {
        if (!courseId) return;
  
        try {
          const data = await loadClassData(courseId);
          setClassData(data);
        } catch (error) {
          console.error('Error loading class data:', error);
        } finally {
          setLoading(false);
        }
      };
  
      fetchData();
    }, [courseId]);

    if (loading) {
      return <LoadingSpinner />;
    }

    if (!classData) {
      return (
        <div className="container">
          <div className="card">
            <h2>Course data not available</h2>
            <p>The detailed course data for AI learning is not available for this course.</p>
            <Link to={`/courses/${courseId}`} className="btn">
              <ArrowLeft size={18} />
              Back to Course Details
            </Link>
          </div>
        </div>
      );
    }

    const handleQuizSelect = (quiz: Quiz) => {
      setSelectedQuiz(quiz);
      setSelectedAssignment(null);
      setActiveTab('quiz');
    };

    const handleAssignmentSelect = (assignment: Assignment) => {
      setSelectedAssignment(assignment);
      setSelectedQuiz(null);
      setActiveTab('assignment');
    };

    return (
      <div className="container">
        <div className="card">
          <Link to={`/courses/${courseId}`} className="btn" style={{ marginBottom: '2rem' }}>
            <ArrowLeft size={18} />
            Back to Course Details
          </Link>
  
          <h1>
            <Bot size={32} style={{ marginRight: '1rem', color: '#667eea' }} />
            AI Learning Experience: {classData.course_info.title}
          </h1>
          <p style={{ fontSize: '1.1rem', color: '#666' }}>
            Interactive AI-powered learning with personalized feedback and assessment
          </p>
  
          <div style={{ display: 'flex', gap: '1rem', marginTop: '2rem' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
              <Clock size={18} style={{ color: '#667eea' }} />
              <span><strong>{classData.course_info.credit_hours} Credits</strong></span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
              <Calendar size={18} style={{ color: '#667eea' }} />
              <span><strong>{classData.course_info.duration}</strong></span>
            </div>
          </div>
        </div>

        {/* Tab Navigation */}
        <div className="card">
          <div style={{ display: 'flex', gap: '1rem', borderBottom: '2px solid #eee', paddingBottom: '1rem' }}>
            <button 
              className={`btn ${activeTab === 'schedule' ? '' : 'btn-outline'}`}
              onClick={() => setActiveTab('schedule')}
              style={{ background: activeTab === 'schedule' ? undefined : 'transparent', color: activeTab === 'schedule' ? undefined : '#667eea' }}
            >
              <Calendar size={18} />
              Course Schedule
            </button>
            <button 
              className={`btn ${activeTab === 'quiz' ? '' : 'btn-outline'}`}
              onClick={() => setActiveTab('quiz')}
              style={{ background: activeTab === 'quiz' ? undefined : 'transparent', color: activeTab === 'quiz' ? undefined : '#667eea' }}
            >
              <HelpCircle size={18} />
              Take Quiz
            </button>
            <button 
              className={`btn ${activeTab === 'assignment' ? '' : 'btn-outline'}`}
              onClick={() => setActiveTab('assignment')}
              style={{ background: activeTab === 'assignment' ? undefined : 'transparent', color: activeTab === 'assignment' ? undefined : '#667eea' }}
            >
              <FileText size={18} />
              Work on Assignment
            </button>
          </div>
        </div>

        {/* Course Schedule Tab */}
        {activeTab === 'schedule' && (
          <div className="card">
            <h2>Course Schedule</h2>
            <div className="course-list">
              {classData.class_schedule.map((session) => (
                <div key={session.session_number} className="course-item">
                  <h3>Week {session.week_number}, Session {session.session_number}: {session.topic}</h3>
                  <p><strong>Date:</strong> {session.date} | <strong>Duration:</strong> {session.duration}</p>
  
                  <div style={{ marginTop: '1rem' }}>
                    <h4>Learning Objectives:</h4>
                    <ul>
                      {session.learning_objectives.map((objective, index) => (
                        <li key={index}>{objective}</li>
                      ))}
                    </ul>
                  </div>
  
                  {session.readings.length > 0 && (
                    <div style={{ marginTop: '1rem' }}>
                      <h4>Required Readings:</h4>
                      <ul>
                        {session.readings.map((reading, index) => (
                          <li key={index}>{reading}</li>
                        ))}
                      </ul>
                    </div>
                  )}
  
                  <div style={{ marginTop: '1rem' }}>
                    <p><strong>Introduction:</strong> {session.lecture_notes.introduction}</p>
                    <p><strong>Demonstration:</strong> {session.lecture_notes.demonstration}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Quiz Selection and Interface */}
        {activeTab === 'quiz' && (
          <div>
            {!selectedQuiz ? (
              <div className="card">
                <h2>Select a Quiz</h2>
                <div className="grid grid-2">
                  {classData.assessments.quizzes.map((quiz) => (
                    <div key={quiz.quiz} className="course-item" style={{ cursor: 'pointer' }} onClick={() => handleQuizSelect(quiz)}>
                      <h3>Quiz {quiz.quiz}: {quiz.topic}</h3>
                      <p><strong>Week:</strong> {quiz.week} | <strong>Duration:</strong> {quiz.duration}</p>
                      <p><strong>Questions:</strong> {quiz.questions.length} | <strong>Total Points:</strong> {quiz.total_points}</p>
                      <button className="btn" style={{ marginTop: '1rem' }}>
                        <HelpCircle size={18} />
                        Take This Quiz
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <QuizInterface 
                quiz={selectedQuiz} 
                onBack={() => setSelectedQuiz(null)}
              />
            )}
          </div>
        )}

        {/* Assignment Selection and Interface */}
        {activeTab === 'assignment' && (
          <div>
            {!selectedAssignment ? (
              <div className="card">
                <h2>Select an Assignment</h2>
                <div className="course-list">
                  {classData.assessments.major_assignments.map((assignment) => (
                    <div key={assignment.assignment} className="course-item" style={{ cursor: 'pointer' }} onClick={() => handleAssignmentSelect(assignment)}>
                      <h3>Assignment {assignment.assignment}: {assignment.title}</h3>
                      <p><strong>Assigned:</strong> Week {assignment.week_assigned} | <strong>Due:</strong> Week {assignment.week_due}</p>
                      <p><strong>Points:</strong> {assignment.points}</p>
                      <p>{assignment.description}</p>
                      <button className="btn" style={{ marginTop: '1rem' }}>
                        <FileText size={18} />
                        Work on Assignment
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <AssignmentInterface 
                assignment={selectedAssignment} 
                onBack={() => setSelectedAssignment(null)}
              />
            )}
          </div>
        )}
      </div>
    );
  };

src/modules/take_course/components/QuizInterface.tsx: |
  import { useState } from 'react';
  import { ArrowLeft, Send, CheckCircle, AlertCircle } from 'lucide-react';
  import { Quiz, QuizQuestion, AIResponse } from '@/types';
  import { claudeApi } from '@/utils/claudeApi';
  import { LoadingSpinner } from '@/components/LoadingSpinner';

  interface QuizInterfaceProps {
    quiz: Quiz;
    onBack: () => void;
  }

  export const QuizInterface = ({ quiz, onBack }: QuizInterfaceProps) => {
    const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
    const [answers, setAnswers] = useState<string[]>(new Array(quiz.questions.length).fill(''));
    const [isSubmitting, setIsSubmitting] = useState(false);
    const [results, setResults] = useState<AIResponse[]>([]);
    const [showResults, setShowResults] = useState(false);

    const currentQuestion = quiz.questions[currentQuestionIndex];

    const handleAnswerChange = (value: string) => {
      const newAnswers = [...answers];
      newAnswers[currentQuestionIndex] = value;
      setAnswers(newAnswers);
    };

    const handleSubmitQuiz = async () => {
      setIsSubmitting(true);
      const quizResults: AIResponse[] = [];

      for (let i = 0; i < quiz.questions.length; i++) {
        const question = quiz.questions[i];
        const studentAnswer = answers[i];
  
        if (studentAnswer.trim()) {
          try {
            const result = await claudeApi.gradeAnswer(
              question.question,
              studentAnswer,
              question.answer,
              question.rubric,
              question.points
            );
            quizResults.push(result);
          } catch (error) {
            quizResults.push({
              answer: studentAnswer,
              score: 0,
              feedback: `Error grading question ${i + 1}: ${error instanceof Error ? error.message : 'Unknown error'}`,
              total_points: question.points
            });
          }
        } else {
          quizResults.push({
            answer: '',
            score: 0,
            feedback: 'No answer provided',
            total_points: question.points
          });
        }
      }

      setResults(quizResults);
      setShowResults(true);
      setIsSubmitting(false);
    };

    const totalScore = results.reduce((sum, result) => sum + result.score, 0);
    const totalPossible = results.reduce((sum, result) => sum + result.total_points, 0);
    const percentage = totalPossible > 0 ? Math.round((totalScore / totalPossible) * 100) : 0;

    if (showResults) {
      return (
        <div className="card">
          <button onClick={onBack} className="btn" style={{ marginBottom: '2rem' }}>
            <ArrowLeft size={18} />
            Back to Quiz Selection
          </button>
  
          <h2>Quiz Results: {quiz.topic}</h2>
  
          <div className="grading-result" style={{ marginBottom: '2rem' }}>
            <h3>
              <CheckCircle size={24} style={{ color: '#28a745', marginRight: '0.5rem' }} />
              Final Score: {totalScore} / {totalPossible} ({percentage}%)
            </h3>
          </div>

          {results.map((result, index) => (
            <div key={index} className="question-card">
              <h4>Question {index + 1}</h4>
              <p><strong>Question:</strong> {quiz.questions[index].question}</p>
              <p><strong>Your Answer:</strong> {result.answer || 'No answer provided'}</p>
              <p><strong>Correct Answer:</strong> {quiz.questions[index].answer}</p>
  
              <div className="grading-result">
                <p><strong>Score:</strong> {result.score} / {result.total_points}</p>
                <p><strong>Feedback:</strong> {result.feedback}</p>
              </div>
            </div>
          ))}
        </div>
      );
    }

    if (isSubmitting) {
      return (
        <div className="card">
          <h2>Grading Quiz with AI...</h2>
          <LoadingSpinner />
          <p style={{ textAlign: 'center', marginTop: '1rem' }}>
            Please wait while Claude AI grades your responses...
          </p>
        </div>
      );
    }

    return (
      <div className="card">
        <button onClick={onBack} className="btn" style={{ marginBottom: '2rem' }}>
          <ArrowLeft size={18} />
          Back to Quiz Selection
        </button>
  
        <h2>Quiz {quiz.quiz}: {quiz.topic}</h2>
        <p><strong>Duration:</strong> {quiz.duration} | <strong>Total Points:</strong> {quiz.total_points}</p>
  
        <div style={{ marginBottom: '2rem' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
            <h3>Question {currentQuestionIndex + 1} of {quiz.questions.length}</h3>
            <span style={{ color: '#667eea', fontWeight: '600' }}>{currentQuestion.points} points</span>
          </div>
  
          <div className="question-card">
            <p style={{ fontSize: '1.1rem', marginBottom: '1.5rem' }}>{currentQuestion.question}</p>
  
            <textarea
              value={answers[currentQuestionIndex]}
              onChange={(e) => handleAnswerChange(e.target.value)}
              placeholder="Enter your answer here..."
              rows={6}
              style={{
                width: '100%',
                padding: '1rem',
                border: '2px solid #e2e8f0',
                borderRadius: '8px',
                fontSize: '1rem',
                resize: 'vertical'
              }}
            />
  
            <div style={{ marginTop: '1rem', fontSize: '0.9rem', color: '#666' }}>
              <strong>Question Type:</strong> {currentQuestion.type}
            </div>
          </div>
  
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '2rem' }}>
            <button 
              onClick={() => setCurrentQuestionIndex(Math.max(0, currentQuestionIndex - 1))}
              disabled={currentQuestionIndex === 0}
              className="btn"
            >
              Previous
            </button>
  
            <div style={{ display: 'flex', gap: '0.5rem' }}>
              {quiz.questions.map((_, index) => (
                <button
                  key={index}
                  onClick={() => setCurrentQuestionIndex(index)}
                  style={{
                    width: '40px',
                    height: '40px',
                    borderRadius: '50%',
                    border: 'none',
                    background: index === currentQuestionIndex ? '#667eea' : answers[index] ? '#28a745' : '#e2e8f0',
                    color: index === currentQuestionIndex || answers[index] ? 'white' : '#666',
                    cursor: 'pointer'
                  }}
                >
                  {index + 1}
                </button>
              ))}
            </div>
  
            {currentQuestionIndex < quiz.questions.length - 1 ? (
              <button 
                onClick={() => setCurrentQuestionIndex(Math.min(quiz.questions.length - 1, currentQuestionIndex + 1))}
                className="btn"
              >
                Next
              </button>
            ) : (
              <button 
                onClick={handleSubmitQuiz}
                className="btn"
                disabled={answers.some(answer => !answer.trim())}
              >
                <Send size={18} />
                Submit Quiz for AI Grading
              </button>
            )}
          </div>
  
          {answers.some(answer => !answer.trim()) && (
            <div style={{ marginTop: '1rem', padding: '1rem', background: '#fff3cd', border: '1px solid #ffeaa7', borderRadius: '8px' }}>
              <AlertCircle size={18} style={{ color: '#856404', marginRight: '0.5rem' }} />
              <span style={{ color: '#856404' }}>Please answer all questions before submitting.</span>
            </div>
          )}
        </div>
      </div>
    );
  };

src/modules/take_course/components/AssignmentInterface.tsx: |
  import { useState } from 'react';
  import { ArrowLeft, Send, FileText, CheckCircle } from 'lucide-react';
  import { Assignment, AIResponse } from '@/types';
  import { claudeApi } from '@/utils/claudeApi';
  import { LoadingSpinner } from '@/components/LoadingSpinner';

  interface AssignmentInterfaceProps {
    assignment: Assignment;
    onBack: () => void;
  }

  export const AssignmentInterface = ({ assignment, onBack }: AssignmentInterfaceProps) => {
    const [response, setResponse] = useState('');
    const [isSubmitting, setIsSubmitting] = useState(false);
    const [result, setResult] = useState<AIResponse | null>(null);
    const [showFeedback, setShowFeedback] = useState(false);

    const handleSubmitAssignment = async () => {
      if (!response.trim()) return;

      setIsSubmitting(true);
  
      try {
        // For assignments, we'll ask Claude to provide feedback rather than a strict grade
        const feedbackPrompt = `
          Please review this student's assignment submission and provide constructive feedback.

          Assignment: ${assignment.title}
          Description: ${assignment.description}
  
          Objectives:
          ${assignment.objectives.map(obj => `- ${obj}`).join('\n')}
  
          Student Submission:
          ${response}

          Please provide:
          1. Strengths of the submission
          2. Areas for improvement
          3. Specific suggestions for enhancement
          4. Overall assessment of how well it meets the objectives
  
          Format your response as detailed feedback that would help the student improve.
        `;

        const feedback = await claudeApi.askQuestion(feedbackPrompt);
  
        setResult({
          answer: response,
          score: 0, // Assignments might not have numerical scores
          feedback: feedback,
          total_points: assignment.points
        });
  
        setShowFeedback(true);
      } catch (error) {
        setResult({
          answer: response,
          score: 0,
          feedback: `Error getting feedback: ${error instanceof Error ? error.message : 'Unknown error'}`,
          total_points: assignment.points
        });
        setShowFeedback(true);
      } finally {
        setIsSubmitting(false);
      }
    };

    if (showFeedback && result) {
      return (
        <div className="card">
          <button onClick={onBack} className="btn" style={{ marginBottom: '2rem' }}>
            <ArrowLeft size={18} />
            Back to Assignment Selection
          </button>
  
          <h2>Assignment Feedback: {assignment.title}</h2>
  
          <div className="grading-result" style={{ marginBottom: '2rem' }}>
            <h3>
              <CheckCircle size={24} style={{ color: '#28a745', marginRight: '0.5rem' }} />
              Submission Received and Reviewed
            </h3>
          </div>

          <div className="question-card">
            <h4>Your Submission</h4>
            <div style={{ 
              background: '#f8f9fa', 
              padding: '1rem', 
              borderRadius: '8px', 
              border: '1px solid #e9ecef',
              marginBottom: '1.5rem'
            }}>
              <pre style={{ whiteSpace: 'pre-wrap', fontFamily: 'inherit' }}>{result.answer}</pre>
            </div>
  
            <h4>AI Feedback</h4>
            <div className="grading-result">
              <div style={{ whiteSpace: 'pre-wrap', lineHeight: '1.6' }}>{result.feedback}</div>
            </div>
          </div>

          <div style={{ marginTop: '2rem', textAlign: 'center' }}>
            <button 
              onClick={() => {
                setShowFeedback(false);
                setResult(null);
                setResponse('');
              }}
              className="btn"
            >
              Submit Another Response
            </button>
          </div>
        </div>
      );
    }

    if (isSubmitting) {
      return (
        <div className="card">
          <h2>Getting AI Feedback...</h2>
          <LoadingSpinner />
          <p style={{ textAlign: 'center', marginTop: '1rem' }}>
            Please wait while Claude AI reviews your assignment...
          </p>
        </div>
      );
    }

    return (
      <div className="card">
        <button onClick={onBack} className="btn" style={{ marginBottom: '2rem' }}>
          <ArrowLeft size={18} />
          Back to Assignment Selection
        </button>
  
        <h2>Assignment {assignment.assignment}: {assignment.title}</h2>
        <div style={{ marginBottom: '2rem' }}>
          <p><strong>Week Assigned:</strong> {assignment.week_assigned} | <strong>Due Week:</strong> {assignment.week_due}</p>
          <p><strong>Total Points:</strong> {assignment.points}</p>
        </div>
  
        <div className="question-card">
          <h3>Assignment Description</h3>
          <p style={{ fontSize: '1.1rem', lineHeight: '1.6', marginBottom: '1.5rem' }}>
            {assignment.description}
          </p>
  
          <h4>Objectives</h4>
          <ul style={{ marginBottom: '1.5rem' }}>
            {assignment.objectives.map((objective, index) => (
              <li key={index} style={{ marginBottom: '0.5rem' }}>{objective}</li>
            ))}
          </ul>
  
          <h4>Deliverables</h4>
          <ul style={{ marginBottom: '1.5rem' }}>
            {assignment.deliverables.map((deliverable, index) => (
              <li key={index} style={{ marginBottom: '0.5rem' }}>{deliverable}</li>
            ))}
          </ul>
        </div>
  
        <div className="question-card">
          <h3>
            <FileText size={24} style={{ marginRight: '0.5rem', color: '#667eea' }} />
            Your Assignment Submission
          </h3>
          <p style={{ marginBottom: '1rem', color: '#666' }}>
            Provide your response to this assignment. The AI will review your submission and provide detailed feedback.
          </p>
  
          <textarea
            value={response}
            onChange={(e) => setResponse(e.target.value)}
            placeholder="Enter your assignment response here... Be thorough and address all objectives and deliverables."
            rows={15}
            style={{
              width: '100%',
              padding: '1rem',
              border: '2px solid #e2e8f0',
              borderRadius: '8px',
              fontSize: '1rem',
              resize: 'vertical',
              fontFamily: 'monospace'
            }}
          />
  
          <div style={{ marginTop: '2rem', textAlign: 'center' }}>
            <button 
              onClick={handleSubmitAssignment}
              disabled={!response.trim()}
              className="btn"
              style={{ fontSize: '1.1rem', padding: '1rem 2rem' }}
            >
              <Send size={20} />
              Submit for AI Review
            </button>
          </div>
  
          {!response.trim() && (
            <p style={{ textAlign: 'center', marginTop: '1rem', color: '#666' }}>
              Please provide your assignment response before submitting.
            </p>
          )}
        </div>
      </div>
    );
  };

