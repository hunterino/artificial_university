            <p>This course includes detailed schedules, interactive quizzes, and assignments that can be completed with AI assistance. Experience the future of personalized education!</p>
            <Link to={`/take-course/${courseId}`} className="btn" style={{ marginTop: '1rem', background: '#28a745' }}>
              <Bot size={20} />
              Start AI-Powered Learning Experience
