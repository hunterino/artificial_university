                    ],
                  ),
                  const SizedBox(height: 20),
                  Text(
                    university.learningModel,
                    style: TextStyle(
                      color: Colors.white.withOpacity(0.95),
                      fontSize: 16,
                      fontWeight: FontWeight.w500,
                    ),
                  ),
                  const Spacer(),
                  Row(
                    children: [
                      Expanded(
                        child: _buildStatCard('AI-Powered', 'Assessment'),
                      ),
                      const SizedBox(width: 12),
                      Expanded(
                        child: _buildStatCard('100%', 'Online'),
                      ),
                      const SizedBox(width: 12),
                      Expanded(
                        child: _buildStatCard('24/7', 'Access'),
                      ),
                    ],
                  ),
                ],
              ),
            ),
          ],
        ),
      );
    }
  
    Widget _buildStatCard(String title, String subtitle) {
      return Container(
        padding: const EdgeInsets.symmetric(vertical: 12, horizontal: 8),
        decoration: BoxDecoration(
          color: Colors.white.withOpacity(0.1),
          borderRadius: BorderRadius.circular(12),
          border: Border.all(
            color: Colors.white.withOpacity(0.2),
          ),
        ),
        child: Column(
          children: [
            Text(
              title,
              style: const TextStyle(
                color: Colors.white,
                fontSize: 16,
                fontWeight: FontWeight.bold,
              ),
              textAlign: TextAlign.center,
            ),
            Text(
              subtitle,
              style: TextStyle(
                color: Colors.white.withOpacity(0.9),
                fontSize: 12,
              ),
              textAlign: TextAlign.center,
            ),
          ],
        ),
      );
    }
  }
  
  class UniversityPatternPainter extends CustomPainter {
    @override
    void paint(Canvas canvas, Size size) {
      final paint = Paint()
        ..color = Colors.white.withOpacity(0.1)
        ..style = PaintingStyle.stroke
        ..strokeWidth = 1;
  
      // Draw a grid pattern
      const spacing = 40.0;
      for (double x = 0; x < size.width; x += spacing) {
        canvas.drawLine(
          Offset(x, 0),
          Offset(x, size.height),
          paint,
        );
      }
      for (double y = 0; y < size.height; y += spacing) {
        canvas.drawLine(
          Offset(0, y),
          Offset(size.width, y),
          paint,
        );
      }
  
      // Draw some decorative circles
      paint.style = PaintingStyle.fill;
      paint.color = Colors.white.withOpacity(0.05);
  
      canvas.drawCircle(
        Offset(size.width * 0.8, size.height * 0.3),
        30,
        paint,
      );
      canvas.drawCircle(
        Offset(size.width * 0.2, size.height * 0.7),
        20,
        paint,
      );
    }
  
    @override
    bool shouldRepaint(covariant CustomPainter oldDelegate) => false;
  }

