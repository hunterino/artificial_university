                        size: 28,
                      ),
                    ),
                    const SizedBox(width: 12),
                    Expanded(
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Text(
                            _getShortTitle(degree.title),
                            style: Theme.of(context).textTheme.titleMedium?.copyWith(
                              fontWeight: FontWeight.bold,
                            ),
                          ),
                          Text(
                            degree.degreeId,
                            style: Theme.of(context).textTheme.bodySmall?.copyWith(
                              color: Colors.grey[600],
                            ),
                          ),
                        ],
                      ),
                    ),
                    Icon(
                      Icons.arrow_forward_ios,
                      size: 16,
                      color: Colors.grey[400],
                    ),
                  ],
                ),
                const SizedBox(height: 12),
                Text(
                  degree.description,
                  style: Theme.of(context).textTheme.bodyMedium,
                  maxLines: 3,
                  overflow: TextOverflow.ellipsis,
                ),
                const SizedBox(height: 16),
                Row(
                  children: [
                    _buildInfoChip(
                      Icons.schedule,
                      degree.duration,
                      Colors.blue,
                    ),
                    const SizedBox(width: 8),
                    _buildInfoChip(
                      Icons.book,
                      '${degree.totalCredits} Credits',
                      Colors.green,
                    ),
                    const SizedBox(width: 8),
                    _buildInfoChip(
                      Icons.assignment,
                      '${degree.requiredCourses.length} Courses',
                      Colors.orange,
                    ),
                  ],
                ),
              ],
            ),
          ),
        ),
      );
    }
  
    Widget _buildInfoChip(IconData icon, String text, Color color) {
      return Container(
        padding: const EdgeInsets.symmetric(horizontal: 8, vertical: 4),
        decoration: BoxDecoration(
          color: color.withOpacity(0.1),
          borderRadius: BorderRadius.circular(8),
          border: Border.all(color: color.withOpacity(0.3)),
        ),
        child: Row(
          mainAxisSize: MainAxisSize.min,
          children: [
            Icon(icon, size: 14, color: color),
            const SizedBox(width: 4),
            Text(
              text,
              style: TextStyle(
                fontSize: 12,
                color: color,
                fontWeight: FontWeight.w500,
              ),
            ),
          ],
        ),
      );
    }
  
    String _getShortTitle(String title) {
      return title
          .replaceAll('Bachelor of Science in ', 'BS ')
          .replaceAll('Bachelor of Arts in ', 'BA ');
    }
  
    IconData _getDegreeIcon(String degreeId) {
      switch (degreeId) {
        case 'BSCS001':
          return Icons.computer;
        case 'BSBA001':
          return Icons.business_center;
        case 'BSHI001':
          return Icons.health_and_safety;
        case 'BSCY001':
          return Icons.security;
        case 'BSPM001':
          return Icons.assignment;
        case 'BAPS001':
          return Icons.psychology;
        case 'BAEL001':
          return Icons.menu_book;
        case 'BAGD001':
          return Icons.games;
        case 'BAED001':
          return Icons.cast_for_education;
        case 'BADC001':
          return Icons.campaign;
        case 'BAIS001':
          return Icons.public;
        case 'BAUX001':
          return Icons.design_services;
        default:
          return Icons.school;
      }
    }
  
    Color _getDegreeColor(String degreeId) {
      switch (degreeId) {
        case 'BSCS001':
          return Colors.blue;
        case 'BSBA001':
          return Colors.green;
        case 'BSHI001':
          return Colors.red;
        case 'BSCY001':
          return Colors.deepPurple;
        case 'BSPM001':
          return Colors.orange;
        case 'BAPS001':
          return Colors.purple;
        case 'BAEL001':
          return Colors.indigo;
        case 'BAGD001':
          return Colors.pink;
        case 'BAED001':
          return Colors.teal;
        case 'BADC001':
          return Colors.cyan;
        case 'BAIS001':
          return Colors.amber;
        case 'BAUX001':
          return Colors.deepOrange;
        default:
          return Colors.grey;
      }
    }
  }

lib/widgets/course_card.dart: |
  import 'package:flutter/material.dart';
  import 'package:provider/provider.dart';
  import '../models/course.dart';
  import '../services/data_service.dart';
  
  class CourseCard extends StatelessWidget {
    final Course course;
    final VoidCallback onTap;
  
    const CourseCard({
      super.key,
      required this.course,
      required this.onTap,
    });
  
    @override
    Widget build(BuildContext context) {
      return Consumer<DataService>(
        builder: (context, dataService, child) {
          final hasClassDetail = dataService.getClassDetail(course.courseId) != null;
  
          return Card(
            elevation: 2,
            shape: RoundedRectangleBorder(
              borderRadius: BorderRadius.circular(12),
            ),
            child: InkWell(
              onTap: onTap,
              borderRadius: BorderRadius.circular(12),
              child: Padding(
                padding: const EdgeInsets.all(16),
                child: Row(
                  children: [
                    Container(
                      width: 48,
                      height: 48,
                      decoration: BoxDecoration(
                        color: _getCourseColor(course.courseId).withOpacity(0.1),
                        borderRadius: BorderRadius.circular(8),
                      ),
                      child: Icon(
                        _getCourseIcon(course.courseId),
                        color: _getCourseColor(course.courseId),
                        size: 24,
                      ),
                    ),
                    const SizedBox(width: 12),
                    Expanded(
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Row(
                            children: [
                              Text(
                                course.courseId,
                                style: const TextStyle(
                                  fontWeight: FontWeight.bold,
                                  fontSize: 14,
                                ),
                              ),
                              const Spacer(),
                              Container(
                                padding: const EdgeInsets.symmetric(
                                  horizontal: 8,
                                  vertical: 2,
                                ),
                                decoration: BoxDecoration(
                                  color: Colors.blue.withOpacity(0.1),
                                  borderRadius: BorderRadius.circular(8),
                                ),
                                child: Text(
                                  '${course.creditHours} credits',
                                  style: TextStyle(
                                    fontSize: 12,
                                    color: Colors.blue[700],
                                    fontWeight: FontWeight.w500,
                                  ),
                                ),
                              ),
                            ],
                          ),
                          const SizedBox(height: 4),
                          Text(
                            course.title,
                            style: Theme.of(context).textTheme.titleSmall,
                            maxLines: 2,
                            overflow: TextOverflow.ellipsis,
                          ),
                          if (hasClassDetail) ...[
                            const SizedBox(height: 8),
                            Container(
                              padding: const EdgeInsets.symmetric(
                                horizontal: 8,
                                vertical: 4,
                              ),
                              decoration: BoxDecoration(
                                color: Colors.green.withOpacity(0.1),
                                borderRadius: BorderRadius.circular(12),
                              ),
                              child: Row(
                                mainAxisSize: MainAxisSize.min,
                                children: [
                                  Icon(
                                    Icons.play_circle_fill,
                                    size: 14,
                                    color: Colors.green[600],
                                  ),
                                  const SizedBox(width: 4),
                                  Text(
                                    'AI Class Available',
                                    style: TextStyle(
                                      fontSize: 11,
                                      color: Colors.green[600],
                                      fontWeight: FontWeight.w600,
                                    ),
                                  ),
                                ],
                              ),
                            ),
                          ],
                        ],
                      ),
                    ),
                    Icon(
                      Icons.arrow_forward_ios,
                      size: 16,
                      color: Colors.grey[400],
                    ),
                  ],
                ),
              ),
            ),
          );
        },
      );
    }
  
    IconData _getCourseIcon(String courseId) {
      if (courseId.startsWith('CS')) return Icons.code;
      if (courseId.startsWith('BA')) return Icons.business;
      if (courseId.startsWith('HI')) return Icons.health_and_safety;
      if (courseId.startsWith('CY')) return Icons.security;
      if (courseId.startsWith('PM')) return Icons.assignment;
      if (courseId.startsWith('PSY')) return Icons.psychology;
      if (courseId.startsWith('ENG')) return Icons.menu_book;
      if (courseId.startsWith('GD')) return Icons.games;
      if (courseId.startsWith('ED')) return Icons.school;
      if (courseId.startsWith('DC')) return Icons.campaign;
      if (courseId.startsWith('IS')) return Icons.public;
      if (courseId.startsWith('UX')) return Icons.design_services;
      if (courseId.startsWith('MATH')) return Icons.calculate;
      if (courseId.startsWith('GEN')) return Icons.library_books;
      return Icons.subject;
    }
  
    Color _getCourseColor(String courseId) {
      if (courseId.startsWith('CS')) return Colors.blue;
      if (courseId.startsWith('BA')) return Colors.green;
      if (courseId.startsWith('HI')) return Colors.red;
      if (courseId.startsWith('CY')) return Colors.deepPurple;
      if (courseId.startsWith('PM')) return Colors.orange;
      if (courseId.startsWith('PSY')) return Colors.purple;
      if (courseId.startsWith('ENG')) return Colors.indigo;
      if (courseId.startsWith('GD')) return Colors.pink;
      if (courseId.startsWith('ED')) return Colors.teal;
      if (courseId.startsWith('DC')) return Colors.cyan;
      if (courseId.startsWith('IS')) return Colors.amber;
      if (courseId.startsWith('UX')) return Colors.deepOrange;
      if (courseId.startsWith('MATH')) return Colors.brown;
      if (courseId.startsWith('GEN')) return Colors.grey;
      return Colors.blueGrey;
    }
  }

lib/widgets/ai_grading_widget.dart: |
  import 'package:flutter/material.dart';
  import '../services/ai_service.dart';
  
  class AIGradingWidget extends StatelessWidget {
    final AIGradingResult gradingResult;
  
    const AIGradingWidget({
      super.key,
      required this.gradingResult,
    });
  
    @override
    Widget build(BuildContext context) {
      return Card(
        elevation: 4,
        shape: RoundedRectangleBorder(
          borderRadius: BorderRadius.circular(16),
        ),
        child: Padding(
          padding: const EdgeInsets.all(20),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              _buildHeader(context),
              const SizedBox(height: 16),
              _buildScoreDisplay(context),
              const SizedBox(height: 16),
              _buildRubricBreakdown(context),
              const SizedBox(height: 16),
              _buildFeedback(context),
            ],
          ),
        ),
      );
    }
  
    Widget _buildHeader(BuildContext context) {
      return Row(
        children: [
          Container(
            padding: const EdgeInsets.all(12),
            decoration: BoxDecoration(
              color: Colors.purple.withOpacity(0.1),
              borderRadius: BorderRadius.circular(12),
            ),
            child: Icon(
              Icons.psychology,
              color: Colors.purple[600],
              size: 24,
            ),
          ),
          const SizedBox(width: 12),
          Expanded(
            child: Column(
              crossAxisAlignment: CrossAxisAlignment.start,
              children: [
                Text(
                  'AI Grading Results',
                  style: Theme.of(context).textTheme.titleLarge?.copyWith(
                    fontWeight: FontWeight.bold,
                  ),
                ),
                Text(
                  'Powered by Advanced Language Model',
                  style: Theme.of(context).textTheme.bodySmall?.copyWith(
                    color: Colors.grey[600],
                  ),
                ),
              ],
            ),
          ),
        ],
      );
    }
  
    Widget _buildScoreDisplay(BuildContext context) {
      final gradeColor = _getGradeColor(gradingResult.percentage);
  
      return Container(
        padding: const EdgeInsets.all(20),
        decoration: BoxDecoration(
          gradient: LinearGradient(
            colors: [
              gradeColor.withOpacity(0.1),
              gradeColor.withOpacity(0.05),
            ],
          ),
          borderRadius: BorderRadius.circular(16),
          border: Border.all(color: gradeColor.withOpacity(0.3)),
        ),
        child: Row(
          children: [
            Expanded(
              child: Column(
                children: [
                  Text(
                    '${gradingResult.score}',
                    style: TextStyle(
                      fontSize: 32,
                      fontWeight: FontWeight.bold,
                      color: gradeColor,
                    ),
                  ),
                  Text(
                    'out of ${gradingResult.maxScore}',
                    style: Theme.of(context).textTheme.bodyMedium,
                  ),
                ],
              ),
            ),
            Container(
              width: 1,
              height: 60,
              color: Colors.grey[300],
            ),
            Expanded(
              child: Column(
                children: [
                  Text(
                    '${gradingResult.percentage.toStringAsFixed(1)}%',
                    style: TextStyle(
                      fontSize: 24,
                      fontWeight: FontWeight.bold,
                      color: gradeColor,
                    ),
                  ),
                  Text(
                    gradingResult.letterGrade,
                    style: TextStyle(
                      fontSize: 20,
                      fontWeight: FontWeight.bold,
                      color: gradeColor,
                    ),
                  ),
                ],
              ),
            ),
          ],
        ),
      );
    }
  
    Widget _buildRubricBreakdown(BuildContext context) {
      return Column(
        crossAxisAlignment: CrossAxisAlignment.start,
        children: [
          Text(
            'Rubric Breakdown',
            style: Theme.of(context).textTheme.titleMedium?.copyWith(
              fontWeight: FontWeight.bold,
            ),
          ),
          const SizedBox(height: 12),
          ...gradingResult.rubricBreakdown.map((rubricScore) =>
              _buildRubricItem(context, rubricScore)),
        ],
      );
    }
  
    Widget _buildRubricItem(BuildContext context, RubricScore rubricScore) {
      final percentage = rubricScore.percentage;
      final color = _getGradeColor(percentage);
  
      return Padding(
        padding: const EdgeInsets.only(bottom: 12),
        child: Column(
          crossAxisAlignment: CrossAxisAlignment.start,
          children: [
            Row(
              children: [
                Expanded(
                  child: Text(
                    rubricScore.criterion,
                    style: const TextStyle(fontWeight: FontWeight.w600),
                  ),
                ),
                Container(
                  padding: const EdgeInsets.symmetric(horizontal: 8, vertical: 4),
                  decoration: BoxDecoration(
                    color: color.withOpacity(0.1),
                    borderRadius: BorderRadius.circular(8),
                  ),
                  child: Text(
                    '${rubricScore.score}/${rubricScore.maxScore}',
                    style: TextStyle(
                      fontWeight: FontWeight.bold,
                      color: color,
                      fontSize: 12,
                    ),
                  ),
                ),
              ],
            ),
            const SizedBox(height: 4),
            LinearProgressIndicator(
              value: percentage / 100,
              backgroundColor: Colors.grey[300],
              valueColor: AlwaysStoppedAnimation<Color>(color),
            ),
            const SizedBox(height: 4),
            Text(
              rubricScore.feedback,
              style: Theme.of(context).textTheme.bodySmall?.copyWith(
                color: Colors.grey[600],
              ),
            ),
          ],
        ),
      );
    }
  
    Widget _buildFeedback(BuildContext context) {
      return Column(
        crossAxisAlignment: CrossAxisAlignment.start,
        children: [
          Text(
            'AI Feedback',
            style: Theme.of(context).textTheme.titleMedium?.copyWith(
              fontWeight: FontWeight.bold,
            ),
          ),
          const SizedBox(height: 8),
          Container(
            padding: const EdgeInsets.all(16),
            decoration: BoxDecoration(
              color: Colors.blue.withOpacity(0.05),
              borderRadius: BorderRadius.circular(12),
              border: Border.all(color: Colors.blue.withOpacity(0.2)),
            ),
            child: Text(
              gradingResult.feedback,
              style: Theme.of(context).textTheme.bodyMedium?.copyWith(
                height: 1.5,
              ),
            ),
          ),
        ],
      );
    }
  
    Color _getGradeColor(double percentage) {
      if (percentage >= 90) return Colors.green;
      if (percentage >= 80) return Colors.blue;
      if (percentage >= 70) return Colors.orange;
      if (percentage >= 60) return Colors.deepOrange;
      return Colors.red;
    }
  }

