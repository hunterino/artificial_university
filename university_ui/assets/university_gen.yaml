    */
  }
  
  class AIGradingResult {
    final int score;
    final int maxScore;
    final String feedback;
    final List<RubricScore> rubricBreakdown;
  
    AIGradingResult({
      required this.score,
      required this.maxScore,
      required this.feedback,
      required this.rubricBreakdown,
    });
  
    double get percentage => (score / maxScore) * 100;
    String get letterGrade {
      if (percentage >= 97) return 'A+';
      if (percentage >= 93) return 'A';
      if (percentage >= 90) return 'A-';
      if (percentage >= 87) return 'B+';
      if (percentage >= 83) return 'B';
      if (percentage >= 80) return 'B-';
      if (percentage >= 77) return 'C+';
      if (percentage >= 73) return 'C';
      if (percentage >= 70) return 'C-';
      if (percentage >= 67) return 'D+';
      if (percentage >= 63) return 'D';
      if (percentage >= 60) return 'D-';
      return 'F';
    }
  }
  
  class RubricScore {
    final String criterion;
    final int score;
    final int maxScore;
    final String feedback;
  
    RubricScore({
      required this.criterion,
      required this.score,
      required this.maxScore,
      required this.feedback,
    });
  
    double get percentage => (score / maxScore) * 100;
  }

lib/screens/home_screen.dart: |
  import 'package:flutter/material.dart';
  import 'package:provider/provider.dart';
  import 'package:flutter_staggered_animations/flutter_staggered_animations.dart';
  import '../services/data_service.dart';
  import '../widgets/university_header.dart';
  import 'degrees_screen.dart';
  
  class HomeScreen extends StatefulWidget {
    const HomeScreen({super.key});
  
    @override
    State<HomeScreen> createState() => _HomeScreenState();
  }
  
  class _HomeScreenState extends State<HomeScreen> {
    @override
    void initState() {
      super.initState();
    Future.microtask(() => 
        Provider.of<DataService>(context, listen: false).loadUniversityData()
      );
    }
  
    @override
    Widget build(BuildContext context) {
      return Scaffold(
        body: Consumer<DataService>(
          builder: (context, dataService, child) {
            if (dataService.isLoading) {
              return const Center(
                child: Column(
                  mainAxisAlignment: MainAxisAlignment.center,
                  children: [
                    CircularProgressIndicator(),
                    SizedBox(height: 16),
                    Text('Loading University Data...'),
                  ],
                ),
              );
            }
  
            final university = dataService.university;
            if (university == null) {
              return const Center(
                child: Text('Failed to load university data'),
              );
            }
  
            return CustomScrollView(
              slivers: [
                SliverAppBar(
                  expandedHeight: 300,
                  floating: false,
                  pinned: true,
                  flexibleSpace: FlexibleSpaceBar(
                    background: UniversityHeader(university: university),
                  ),
                ),
                SliverPadding(
                  padding: const EdgeInsets.all(16),
                  sliver: SliverList(
                    delegate: SliverChildListDelegate([
                      _buildWelcomeSection(university),
                      const SizedBox(height: 24),
                      _buildFeaturesSection(),
                      const SizedBox(height: 24),
                      _buildQuickActions(context),
                      const SizedBox(height: 24),
                      _buildStatsSection(dataService),
                    ]),
                  ),
                ),
              ],
            );
          },
        ),
      );
    }
  
    Widget _buildWelcomeSection(University university) {
      return AnimationLimiter(
        child: Column(
          children: AnimationConfiguration.toStaggeredList(
            duration: const Duration(milliseconds: 375),
            childAnimationBuilder: (widget) => SlideAnimation(
              horizontalOffset: 50.0,
              child: FadeInAnimation(child: widget),
            ),
            children: [
              Card(
                elevation: 4,
                child: Padding(
                  padding: const EdgeInsets.all(20),
                  child: Column(
                    crossAxisAlignment: CrossAxisAlignment.start,
                    children: [
                      Text(
                        'Welcome to ${university.name}',
                        style: Theme.of(context).textTheme.headlineSmall?.copyWith(
                          fontWeight: FontWeight.bold,
                          color: Theme.of(context).primaryColor,
                        ),
                      ),
                      const SizedBox(height: 12),
                      Text(
                        university.mission,
                        style: Theme.of(context).textTheme.bodyLarge,
                      ),
                      const SizedBox(height: 16),
                      Row(
                        children: [
                          Icon(Icons.verified, color: Colors.green[600]),
                          const SizedBox(width: 8),
                          Expanded(
                            child: Text(
                              university.accreditation,
                              style: Theme.of(context).textTheme.bodyMedium?.copyWith(
                                color: Colors.green[600],
                                fontWeight: FontWeight.w500,
                              ),
                            ),
                          ),
                        ],
                      ),
                    ],
                  ),
                ),
              ),
            ],
          ),
        ),
      );
    }
  
    Widget _buildFeaturesSection() {
      return Column(
        crossAxisAlignment: CrossAxisAlignment.start,
        children: [
          Text(
            'AI-Powered Learning Experience',
            style: Theme.of(context).textTheme.headlineSmall?.copyWith(
              fontWeight: FontWeight.bold,
            ),
          ),
          const SizedBox(height: 16),
          AnimationLimiter(
            child: GridView.count(
              crossAxisCount: 2,
              shrinkWrap: true,
              physics: const NeverScrollableScrollPhysics(),
              mainAxisSpacing: 12,
              crossAxisSpacing: 12,
              childAspectRatio: 1.2,
              children: AnimationConfiguration.toStaggeredList(
                duration: const Duration(milliseconds: 375),
                childAnimationBuilder: (widget) => SlideAnimation(
                  verticalOffset: 50.0,
                  child: FadeInAnimation(child: widget),
                ),
                children: [
                  _buildFeatureCard(
                    Icons.psychology,
                    'AI Assessment',
                    'Real-time grading with detailed feedback',
                    Colors.blue,
                  ),
                  _buildFeatureCard(
                    Icons.adaptive_audio_mic,
                    'Adaptive Learning',
                    'Personalized learning pathways',
                    Colors.green,
                  ),
                  _buildFeatureCard(
                    Icons.analytics,
                    'Progress Analytics',
                    'Track your learning journey',
                    Colors.orange,
                  ),
                  _buildFeatureCard(
                    Icons.devices,
                    '100% Online',
                    'Learn anywhere, anytime',
                    Colors.purple,
                  ),
                ],
              ),
            ),
          ),
        ],
      );
    }
  
    Widget _buildFeatureCard(IconData icon, String title, String description, Color color) {
      return Card(
        elevation: 2,
        child: Padding(
          padding: const EdgeInsets.all(16),
          child: Column(
            mainAxisAlignment: MainAxisAlignment.center,
            children: [
              Icon(icon, size: 40, color: color),
              const SizedBox(height: 8),
              Text(
                title,
                style: const TextStyle(
                  fontWeight: FontWeight.bold,
                  fontSize: 14,
                ),
                textAlign: TextAlign.center,
              ),
              const SizedBox(height: 4),
              Text(
                description,
                style: const TextStyle(fontSize: 12),
                textAlign: TextAlign.center,
              ),
            ],
          ),
        ),
      );
    }
  
    Widget _buildQuickActions(BuildContext context) {
      return Column(
        crossAxisAlignment: CrossAxisAlignment.start,
        children: [
          Text(
            'Quick Actions',
            style: Theme.of(context).textTheme.headlineSmall?.copyWith(
              fontWeight: FontWeight.bold,
            ),
          ),
          const SizedBox(height: 16),
          AnimationLimiter(
            child: Column(
              children: AnimationConfiguration.toStaggeredList(
                duration: const Duration(milliseconds: 375),
                childAnimationBuilder: (widget) => SlideAnimation(
                  horizontalOffset: 50.0,
                  child: FadeInAnimation(child: widget),
                ),
                children: [
                  _buildActionButton(
                    context,
                    Icons.school,
                    'Browse Degree Programs',
                    'Explore our comprehensive degree offerings',
                    () => Navigator.push(
                      context,
                      MaterialPageRoute(builder: (_) => const DegreesScreen()),
                    ),
                  ),
                  const SizedBox(height: 12),
                  _buildActionButton(
                    context,
                    Icons.book,
                    'Course Catalog',
                    'View detailed course descriptions',
                    () => Navigator.push(
                      context,
                      MaterialPageRoute(builder: (_) => const DegreesScreen()),
                    ),
                  ),
                  const SizedBox(height: 12),
                  _buildActionButton(
                    context,
                    Icons.play_circle_fill,
                    'Take a Demo Class',
                    'Experience AI-powered learning',
                    () => _showDemoClassDialog(context),
                  ),
                ],
              ),
            ),
          ),
        ],
      );
    }
  
    Widget _buildActionButton(
      BuildContext context,
      IconData icon,
      String title,
      String subtitle,
      VoidCallback onTap,
    ) {
      return Card(
        elevation: 2,
        child: ListTile(
          leading: CircleAvatar(
            backgroundColor: Theme.of(context).primaryColor.withOpacity(0.1),
            child: Icon(icon, color: Theme.of(context).primaryColor),
          ),
          title: Text(
            title,
            style: const TextStyle(fontWeight: FontWeight.bold),
          ),
          subtitle: Text(subtitle),
          trailing: const Icon(Icons.arrow_forward_ios),
          onTap: onTap,
        ),
      );
    }
  
    Widget _buildStatsSection(DataService dataService) {
      return Card(
        elevation: 4,
        child: Padding(
          padding: const EdgeInsets.all(20),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              Text(
                'University Statistics',
                style: Theme.of(context).textTheme.titleLarge?.copyWith(
                  fontWeight: FontWeight.bold,
                ),
              ),
              const SizedBox(height: 16),
              AnimationLimiter(
                child: Row(
                  mainAxisAlignment: MainAxisAlignment.spaceAround,
                  children: AnimationConfiguration.toStaggeredList(
                    duration: const Duration(milliseconds: 375),
                    childAnimationBuilder: (widget) => SlideAnimation(
                      verticalOffset: 30.0,
                      child: FadeInAnimation(child: widget),
                    ),
                    children: [
                      _buildStatItem(
                        '${dataService.degreePrograms.length}',
                        'Degree Programs',
                      ),
                      _buildStatItem(
                        '${dataService.coursesBySubject.values.fold<int>(0, (sum, courses) => sum + courses.length)}',
                        'Total Courses',
                      ),
                      _buildStatItem(
                        '100%',
                        'Online Learning',
                      ),
                    ],
                  ),
                ),
              ),
            ],
          ),
        ),
      );
    }
  
    Widget _buildStatItem(String number, String label) {
      return Column(
        children: [
          Text(
            number,
            style: Theme.of(context).textTheme.headlineMedium?.copyWith(
              fontWeight: FontWeight.bold,
              color: Theme.of(context).primaryColor,
            ),
          ),
          Text(
            label,
            style: Theme.of(context).textTheme.bodySmall,
            textAlign: TextAlign.center,
          ),
        ],
      );
    }
  
    void _showDemoClassDialog(BuildContext context) {
      showDialog(
        context: context,
        builder: (context) => AlertDialog(
          title: const Text('Demo Class Available'),
          content: const Text(
            'Try our 3D Game Development class with AI-powered assessment!\n\n'
            'This demo showcases our innovative learning platform with real-time AI grading and personalized feedback.',
          ),
          actions: [
            TextButton(
              onPressed: () => Navigator.pop(context),
              child: const Text('Maybe Later'),
            ),
            ElevatedButton(
              onPressed: () {
                Navigator.pop(context);
                Navigator.push(
                  context,
                  MaterialPageRoute(builder: (_) => const DegreesScreen()),
                );
              },
              child: const Text('Try Demo'),
            ),
          ],
        ),
      );
    }
  }

lib/screens/degrees_screen.dart: |
  import 'package:flutter/material.dart';
  import 'package:provider/provider.dart';
  import 'package:flutter_staggered_animations/flutter_staggered_animations.dart';
  import '../services/data_service.dart';
  import '../widgets/degree_card.dart';
  import 'degree_detail_screen.dart';
  
  class DegreesScreen extends StatelessWidget {
    const DegreesScreen({super.key});
  
    @override
    Widget build(BuildContext context) {
      return Scaffold(
        appBar: AppBar(
          title: const Text('Degree Programs'),
          backgroundColor: Theme.of(context).primaryColor,
          foregroundColor: Colors.white,
          elevation: 0,
        ),
        body: Consumer<DataService>(
          builder: (context, dataService, child) {
            if (dataService.isLoading) {
              return const Center(child: CircularProgressIndicator());
            }
  
            return Column(
              children: [
                Container(
                  padding: const EdgeInsets.all(16),
                  decoration: BoxDecoration(
                    color: Theme.of(context).primaryColor,
                    borderRadius: const BorderRadius.only(
                      bottomLeft: Radius.circular(24),
                      bottomRight: Radius.circular(24),
                    ),
                  ),
                  child: Column(
                    crossAxisAlignment: CrossAxisAlignment.start,
                    children: [
                      Text(
                        'Choose Your Path',
                        style: Theme.of(context).textTheme.headlineSmall?.copyWith(
                          color: Colors.white,
                          fontWeight: FontWeight.bold,
                        ),
                      ),
                      const SizedBox(height: 8),
                      Text(
                        'Explore our AI-powered degree programs designed for the digital age',
                        style: Theme.of(context).textTheme.bodyMedium?.copyWith(
                          color: Colors.white.withOpacity(0.9),
                        ),
                      ),
                    ],
                  ),
                ),
                Expanded(
                  child: AnimationLimiter(
                    child: ListView.builder(
                      padding: const EdgeInsets.all(16),
                      itemCount: dataService.degreePrograms.length,
                      itemBuilder: (context, index) {
                        final degree = dataService.degreePrograms[index];
                        return AnimationConfiguration.staggeredList(
                          position: index,
                          duration: const Duration(milliseconds: 375),
                          child: SlideAnimation(
                            verticalOffset: 50.0,
                            child: FadeInAnimation(
                              child: Padding(
                                padding: const EdgeInsets.only(bottom: 12),
                                child: DegreeCard(
                                  degree: degree,
                                  onTap: () => Navigator.push(
                                    context,
                                    MaterialPageRoute(
                                      builder: (_) => DegreeDetailScreen(degree: degree),
                                    ),
                                  ),
                                ),
                              ),
                            ),
                          ),
                        );
                      },
                    ),
                  ),
                ),
              ],
            );
          },
        ),
      );
    }
  }

lib/screens/degree_detail_screen.dart: |
  import 'package:flutter/material.dart';
  import 'package:provider/provider.dart';
  import 'package:flutter_staggered_animations/flutter_staggered_animations.dart';
  import '../models/degree.dart';
  import '../services/data_service.dart';
  import '../widgets/course_card.dart';
  import 'course_detail_screen.dart';
  
  class DegreeDetailScreen extends StatelessWidget {
    final DegreeProgram degree;
  
    const DegreeDetailScreen({super.key, required this.degree});
  
    @override
    Widget build(BuildContext context) {
      return Scaffold(
        body: CustomScrollView(
          slivers: [
            SliverAppBar(
              expandedHeight: 250,
              floating: false,
              pinned: true,
              flexibleSpace: FlexibleSpaceBar(
                title: Text(
                  degree.title.replaceAll('Bachelor of Science in ', 'BS ').replaceAll('Bachelor of Arts in ', 'BA '),
                  style: const TextStyle(fontWeight: FontWeight.bold),
                ),
                background: Container(
                  decoration: BoxDecoration(
                    gradient: LinearGradient(
                      begin: Alignment.topLeft,
                      end: Alignment.bottomRight,
                      colors: [
                        Theme.of(context).primaryColor,
                        Theme.of(context).primaryColor.withOpacity(0.8),
                      ],
                    ),
                  ),
                  child: Center(
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        const SizedBox(height: 60),
                        Icon(
                          _getDegreeIcon(degree.degreeId),
                          size: 80,
                          color: Colors.white.withOpacity(0.9),
                        ),
                        const SizedBox(height: 16),
                        Text(
                          '${degree.totalCredits} Credits • ${degree.duration}',
                          style: TextStyle(
                            color: Colors.white.withOpacity(0.9),
                            fontSize: 16,
                          ),
                        ),
                      ],
                    ),
                  ),
                ),
              ),
            ),
            SliverPadding(
              padding: const EdgeInsets.all(16),
              sliver: SliverList(
                delegate: SliverChildListDelegate([
                  _buildDescriptionSection(context),
                  const SizedBox(height: 24),
                  _buildRequirementsSection(context),
                  const SizedBox(height: 24),
                  _buildCoursesSection(context),
                ]),
              ),
            ),
          ],
        ),
      );
    }
  
    Widget _buildDescriptionSection(BuildContext context) {
      return AnimationLimiter(
        child: Column(
          children: AnimationConfiguration.toStaggeredList(
            duration: const Duration(milliseconds: 375),
            childAnimationBuilder: (widget) => SlideAnimation(
              horizontalOffset: 50.0,
              child: FadeInAnimation(child: widget),
            ),
            children: [
              Card(
                elevation: 4,
                child: Padding(
                  padding: const EdgeInsets.all(20),
                  child: Column(
                    crossAxisAlignment: CrossAxisAlignment.start,
                    children: [
                      Text(
                        'Program Overview',
                        style: Theme.of(context).textTheme.titleLarge?.copyWith(
                          fontWeight: FontWeight.bold,
                        ),
                      ),
                      const SizedBox(height: 12),
                      Text(
                        degree.description,
                        style: Theme.of(context).textTheme.bodyLarge,
                      ),
                    ],
                  ),
                ),
              ),
            ],
          ),
        ),
      );
    }
  
    Widget _buildRequirementsSection(BuildContext context) {
      return Card(
        elevation: 4,
        child: Padding(
          padding: const EdgeInsets.all(20),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              Text(
                'Degree Requirements',
                style: Theme.of(context).textTheme.titleLarge?.copyWith(
                  fontWeight: FontWeight.bold,
                ),
              ),
              const SizedBox(height: 16),
              AnimationLimiter(
                child: Row(
                  children: AnimationConfiguration.toStaggeredList(
                    duration: const Duration(milliseconds: 375),
                    childAnimationBuilder: (widget) => SlideAnimation(
                      horizontalOffset: 30.0,
                      child: FadeInAnimation(child: widget),
                    ),
                    children: [
                      Expanded(
                        child: _buildRequirementItem(
                          context,
                          'Total Credits',
                          '${degree.totalCredits}',
                          Icons.school,
                          Colors.blue,
                        ),
                      ),
                      const SizedBox(width: 12),
                      Expanded(
                        child: _buildRequirementItem(
                          context,
                          'Major Credits',
                          '${degree.majorCredits}',
                          Icons.bookmark,
                          Colors.green,
                        ),
                      ),
                      const SizedBox(width: 12),
                      Expanded(
                        child: _buildRequirementItem(
                          context,
                          'Duration',
                          degree.duration,
                          Icons.schedule,
                          Colors.orange,
                        ),
                      ),
                    ],
                  ),
                ),
              ),
            ],
          ),
        ),
      );
    }
  
    Widget _buildRequirementItem(
      BuildContext context,
      String label,
      String value,
      IconData icon,
      Color color,
    ) {
      return Container(
        padding: const EdgeInsets.all(16),
        decoration: BoxDecoration(
          color: color.withOpacity(0.1),
          borderRadius: BorderRadius.circular(12),
          border: Border.all(color: color.withOpacity(0.3)),
        ),
        child: Column(
          children: [
            Icon(icon, color: color, size: 32),
            const SizedBox(height: 8),
            Text(
              value,
              style: Theme.of(context).textTheme.titleMedium?.copyWith(
                fontWeight: FontWeight.bold,
                color: color,
              ),
            ),
            Text(
              label,
              style: Theme.of(context).textTheme.bodySmall,
              textAlign: TextAlign.center,
            ),
          ],
        ),
      );
    }
  
    Widget _buildCoursesSection(BuildContext context) {
      return Column(
        crossAxisAlignment: CrossAxisAlignment.start,
        children: [
          Text(
            'Required Courses (${degree.requiredCourses.length})',
            style: Theme.of(context).textTheme.titleLarge?.copyWith(
              fontWeight: FontWeight.bold,
            ),
          ),
          const SizedBox(height: 16),
          AnimationLimiter(
            child: ListView.builder(
              shrinkWrap: true,
              physics: const NeverScrollableScrollPhysics(),
              itemCount: degree.requiredCourses.length,
              itemBuilder: (context, index) {
                final course = degree.requiredCourses[index];
                return AnimationConfiguration.staggeredList(
                  position: index,
                  duration: const Duration(milliseconds: 375),
                  child: SlideAnimation(
                    verticalOffset: 50.0,
                    child: FadeInAnimation(
                      child: Padding(
                        padding: const EdgeInsets.only(bottom: 8),
                        child: CourseCard(
                          course: course,
                          onTap: () => Navigator.push(
                            context,
                            MaterialPageRoute(
                              builder: (_) => CourseDetailScreen(course: course),
                            ),
                          ),
                        ),
                      ),
                    ),
                  ),
                );
              },
            ),
          ),
        ],
      );
    }
  
    IconData _getDegreeIcon(String degreeId) {
      switch (degreeId) {
        case 'BSCS001':
          return Icons.computer;
        case 'BSBA001':
          return Icons.business_center;
        case 'BSHI001':
          return Icons.health_and_safety;
        case 'BSCY001':
          return Icons.security;
        case 'BSPM001':
          return Icons.assignment;
        case 'BAPS001':
          return Icons.psychology;
        case 'BAEL001':
          return Icons.menu_book;
        case 'BAGD001':
          return Icons.games;
        case 'BAED001':
          return Icons.cast_for_education;
        case 'BADC001':
          return Icons.campaign;
        case 'BAIS001':
          return Icons.public;
        case 'BAUX001':
          return Icons.design_services;
        default:
          return Icons.school;
      }
    }
  }

lib/screens/course_detail_screen.dart: |
  import 'package:flutter/material.dart';
  import 'package:provider/provider.dart';
  import '../models/course.dart';
  import '../services/data_service.dart';
  import 'take_class_screen.dart';
  
  class CourseDetailScreen extends StatelessWidget {
    final Course course;
  
    const CourseDetailScreen({super.key, required this.course});
  
    @override
    Widget build(BuildContext context) {
      return Scaffold(
        appBar: AppBar(
          title: Text(course.courseId),
          backgroundColor: Theme.of(context).primaryColor,
          foregroundColor: Colors.white,
          actions: [
            Consumer<DataService>(
              builder: (context, dataService, child) {
                final hasClassDetail = dataService.getClassDetail(course.courseId) != null;
                if (hasClassDetail) {
                  return TextButton.icon(
                    onPressed: () => Navigator.push(
                      context,
                      MaterialPageRoute(
                        builder: (_) => TakeClassScreen(courseId: course.courseId),
                      ),
                    ),
                    icon: const Icon(Icons.play_arrow, color: Colors.white),
                    label: const Text(
                      'Take Class',
                      style: TextStyle(color: Colors.white),
                    ),
                  );
                }
                return const SizedBox.shrink();
              },
            ),
          ],
        ),
        body: SingleChildScrollView(
          padding: const EdgeInsets.all(16),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              _buildHeaderCard(context),
              const SizedBox(height: 16),
              if (course.description != null) ...[
                _buildDescriptionCard(context),
                const SizedBox(height: 16),
              ],
              if (course.learningObjectives != null) ...[
                _buildObjectivesCard(context),
                const SizedBox(height: 16),
              ],
              if (course.coveredMaterials != null) ...[
                _buildMaterialsCard(context),
                const SizedBox(height: 16),
              ],
              _buildClassAvailabilityCard(context),
            ],
          ),
        ),
      );
    }
  
    Widget _buildHeaderCard(BuildContext context) {
      return Card(
        elevation: 4,
        child: Padding(
          padding: const EdgeInsets.all(20),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              Row(
                children: [
                  Container(
                    padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 6),
                    decoration: BoxDecoration(
                      color: Theme.of(context).primaryColor,
                      borderRadius: BorderRadius.circular(20),
                    ),
                    child: Text(
                      course.courseId,
                      style: const TextStyle(
                        color: Colors.white,
                        fontWeight: FontWeight.bold,
                      ),
                    ),
                  ),
                  const Spacer(),
                  Container(
                    padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 6),
                    decoration: BoxDecoration(
                      color: Colors.blue.withOpacity(0.1),
                      borderRadius: BorderRadius.circular(20),
                      border: Border.all(color: Colors.blue.withOpacity(0.3)),
                    ),
                    child: Text(
                      '${course.creditHours} Credits',
                      style: TextStyle(
                        color: Colors.blue[700],
                        fontWeight: FontWeight.w500,
                      ),
                    ),
                  ),
                ],
              ),
              const SizedBox(height: 16),
              Text(
                course.title,
                style: Theme.of(context).textTheme.headlineSmall?.copyWith(
                  fontWeight: FontWeight.bold,
                ),
              ),
            ],
          ),
        ),
      );
    }
  
    Widget _buildDescriptionCard(BuildContext context) {
      return Card(
        elevation: 2,
        child: Padding(
          padding: const EdgeInsets.all(20),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              Row(
                children: [
                  Icon(Icons.description, color: Theme.of(context).primaryColor),
                  const SizedBox(width: 8),
                  Text(
                    'Course Description',
                    style: Theme.of(context).textTheme.titleLarge?.copyWith(
                      fontWeight: FontWeight.bold,
                    ),
                  ),
                ],
              ),
              const SizedBox(height: 12),
              Text(
                course.description!,
                style: Theme.of(context).textTheme.bodyLarge,
              ),
            ],
          ),
        ),
      );
    }
  
    Widget _buildObjectivesCard(BuildContext context) {
      return Card(
        elevation: 2,
        child: Padding(
          padding: const EdgeInsets.all(20),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              Row(
                children: [
                  Icon(Icons.target, color: Theme.of(context).primaryColor),
                  const SizedBox(width: 8),
                  Text(
                    'Learning Objectives',
                    style: Theme.of(context).textTheme.titleLarge?.copyWith(
                      fontWeight: FontWeight.bold,
                    ),
                  ),
                ],
              ),
              const SizedBox(height: 12),
              ...course.learningObjectives!.map((objective) => Padding(
                padding: const EdgeInsets.only(bottom: 8),
                child: Row(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    Container(
                      margin: const EdgeInsets.only(top: 6),
                      width: 6,
                      height: 6,
                      decoration: BoxDecoration(
                        color: Theme.of(context).primaryColor,
                        shape: BoxShape.circle,
                      ),
                    ),
                    const SizedBox(width: 12),
                    Expanded(
                      child: Text(
                        objective,
                        style: Theme.of(context).textTheme.bodyMedium,
                      ),
                    ),
                  ],
                ),
              )),
            ],
          ),
        ),
      );
    }
  
    Widget _buildMaterialsCard(BuildContext context) {
      return Card(
        elevation: 2,
        child: Padding(
          padding: const EdgeInsets.all(20),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              Row(
                children: [
                  Icon(Icons.library_books, color: Theme.of(context).primaryColor),
                  const SizedBox(width: 8),
                  Text(
                    'Covered Materials',
                    style: Theme.of(context).textTheme.titleLarge?.copyWith(
                      fontWeight: FontWeight.bold,
                    ),
                  ),
                ],
              ),
              const SizedBox(height: 12),
              ...course.coveredMaterials!.map((material) => Padding(
                padding: const EdgeInsets.only(bottom: 8),
                child: Row(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    Container(
                      margin: const EdgeInsets.only(top: 6),
                      width: 6,
                      height: 6,
                      decoration: BoxDecoration(
                        color: Colors.blue,
                        shape: BoxShape.circle,
                      ),
                    ),
                    const SizedBox(width: 12),
                    Expanded(
                      child: Text(
                        material,
                        style: Theme.of(context).textTheme.bodyMedium,
                      ),
                    ),
                  ],
                ),
              )),
            ],
          ),
        ),
      );
    }
  
    Widget _buildClassAvailabilityCard(BuildContext context) {
      return Consumer<DataService>(
        builder: (context, dataService, child) {
          final hasClassDetail = dataService.getClassDetail(course.courseId) != null;
  
          return Card(
            elevation: 2,
            color: hasClassDetail ? Colors.green.withOpacity(0.1) : Colors.grey.withOpacity(0.1),
            child: Padding(
              padding: const EdgeInsets.all(20),
              child: Column(
                crossAxisAlignment: CrossAxisAlignment.start,
                children: [
                  Row(
                    children: [
                      Icon(
                        hasClassDetail ? Icons.play_circle_fill : Icons.info,
                        color: hasClassDetail ? Colors.green : Colors.grey,
                      ),
                      const SizedBox(width: 8),
                      Text(
                        'AI-Powered Class Experience',
                        style: Theme.of(context).textTheme.titleLarge?.copyWith(
                          fontWeight: FontWeight.bold,
                        ),
                      ),
                    ],
                  ),
                  const SizedBox(height: 12),
                  Text(
                    hasClassDetail
                        ? 'This course features our AI-powered learning experience with interactive quizzes, assignments, and real-time grading!'
                        : 'AI-powered learning experience coming soon for this course.',
                    style: Theme.of(context).textTheme.bodyMedium,
                  ),
                  if (hasClassDetail) ...[
                    const SizedBox(height: 16),
                    ElevatedButton.icon(
                      onPressed: () => Navigator.push(
                        context,
                        MaterialPageRoute(
                          builder: (_) => TakeClassScreen(courseId: course.courseId),
                        ),
                      ),
                      icon: const Icon(Icons.play_arrow),
                      label: const Text('Start Learning'),
                      style: ElevatedButton.styleFrom(
                        backgroundColor: Colors.green,
                        foregroundColor: Colors.white,
                      ),
                    ),
                  ],
                ],
              ),
            ),
          );
        },
      );
    }
  }

lib/screens/take_class_screen.dart: |
  import 'package:flutter/material.dart';
  import 'package:provider/provider.dart';
  import 'package:flutter_staggered_animations/flutter_staggered_animations.dart';
  import '../services/data_service.dart';
  import '../models/class_detail.dart';
  import 'quiz_screen.dart';
  import 'assignment_screen.dart';
  
  class TakeClassScreen extends StatefulWidget {
    final String courseId;
  
    const TakeClassScreen({super.key, required this.courseId});
  
    @override
    State<TakeClassScreen> createState() => _TakeClassScreenState();
  }
  
  class _TakeClassScreenState extends State<TakeClassScreen>
      with SingleTickerProviderStateMixin {
    late TabController _tabController;
  
    @override
    void initState() {
      super.initState();
      _tabController = TabController(length: 4, vsync: this);
    }
  
    @override
    void dispose() {
      _tabController.dispose();
      super.dispose();
    }
  
    @override
    Widget build(BuildContext context) {
      return Consumer<DataService>(
        builder: (context, dataService, child) {
          final classDetail = dataService.getClassDetail(widget.courseId);
  
          if (classDetail == null) {
            return Scaffold(
              appBar: AppBar(title: Text(widget.courseId)),
              body: const Center(
                child: Text('Class details not available'),
              ),
            );
          }
  
          return Scaffold(
            appBar: AppBar(
              title: Text(classDetail.courseInfo.title),
              backgroundColor: Theme.of(context).primaryColor,
              foregroundColor: Colors.white,
              bottom: TabBar(
                controller: _tabController,
                labelColor: Colors.white,
                unselectedLabelColor: Colors.white70,
                indicatorColor: Colors.white,
                tabs: const [
                  Tab(icon: Icon(Icons.info), text: 'Overview'),
                  Tab(icon: Icon(Icons.schedule), text: 'Schedule'),
                  Tab(icon: Icon(Icons.quiz), text: 'Quizzes'),
                  Tab(icon: Icon(Icons.assignment), text: 'Assignments'),
                ],
              ),
            ),
            body: TabBarView(
              controller: _tabController,
              children: [
                _buildOverviewTab(context, classDetail),
                _buildScheduleTab(context, classDetail),
                _buildQuizzesTab(context, classDetail),
                _buildAssignmentsTab(context, classDetail),
              ],
            ),
          );
        },
      );
    }
  
    Widget _buildOverviewTab(BuildContext context, ClassDetail classDetail) {
      return SingleChildScrollView(
        padding: const EdgeInsets.all(16),
        child: AnimationLimiter(
          child: Column(
            children: AnimationConfiguration.toStaggeredList(
              duration: const Duration(milliseconds: 375),
              childAnimationBuilder: (widget) => SlideAnimation(
                verticalOffset: 50.0,
                child: FadeInAnimation(child: widget),
              ),
              children: [
                _buildCourseInfoCard(context, classDetail.courseInfo),
                const SizedBox(height: 16),
                _buildGradingBreakdownCard(context, classDetail.gradingBreakdown),
                const SizedBox(height: 16),
                _buildCoursePoliciesCard(context, classDetail.coursePolicies),
              ],
            ),
          ),
        ),
      );
    }
  
    Widget _buildScheduleTab(BuildContext context, ClassDetail classDetail) {
      return AnimationLimiter(
        child: ListView.builder(
          padding: const EdgeInsets.all(16),
          itemCount: classDetail.classSchedule.length,
          itemBuilder: (context, index) {
            final session = classDetail.classSchedule[index];
            return AnimationConfiguration.staggeredList(
              position: index,
              duration: const Duration(milliseconds: 375),
              child: SlideAnimation(
                verticalOffset: 50.0,
                child: FadeInAnimation(
                  child: Padding(
                    padding: const EdgeInsets.only(bottom: 12),
                    child: _buildSessionCard(context, session),
                  ),
                ),
              ),
            );
          },
        ),
      );
    }
  
    Widget _buildQuizzesTab(BuildContext context, ClassDetail classDetail) {
      return AnimationLimiter(
        child: ListView.builder(
          padding: const EdgeInsets.all(16),
          itemCount: classDetail.assessments.quizzes.length,
          itemBuilder: (context, index) {
            final quiz = classDetail.assessments.quizzes[index];
            return AnimationConfiguration.staggeredList(
              position: index,
              duration: const Duration(milliseconds: 375),
              child: SlideAnimation(
                verticalOffset: 50.0,
                child: FadeInAnimation(
                  child: Padding(
                    padding: const EdgeInsets.only(bottom: 12),
                    child: _buildQuizCard(context, quiz),
                  ),
                ),
              ),
            );
          },
        ),
      );
    }
  
    Widget _buildAssignmentsTab(BuildContext context, ClassDetail classDetail) {
      return AnimationLimiter(
        child: ListView.builder(
          padding: const EdgeInsets.all(16),
          itemCount: classDetail.assessments.majorAssignments.length,
          itemBuilder: (context, index) {
            final assignment = classDetail.assessments.majorAssignments[index];
            return AnimationConfiguration.staggeredList(
              position: index,
              duration: const Duration(milliseconds: 375),
              child: SlideAnimation(
                verticalOffset: 50.0,
                child: FadeInAnimation(
                  child: Padding(
                    padding: const EdgeInsets.only(bottom: 12),
                    child: _buildAssignmentCard(context, assignment),
                  ),
                ),
              ),
            );
          },
        ),
      );
    }
  
    Widget _buildCourseInfoCard(BuildContext context, CourseInfo courseInfo) {
      return Card(
        elevation: 4,
        child: Padding(
          padding: const EdgeInsets.all(20),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              Text(
                'Course Information',
                style: Theme.of(context).textTheme.titleLarge?.copyWith(
                  fontWeight: FontWeight.bold,
                ),
              ),
              const SizedBox(height: 16),
              _buildInfoRow('Course ID', courseInfo.courseId),
              _buildInfoRow('Credit Hours', '${courseInfo.creditHours}'),
              _buildInfoRow('Duration', courseInfo.duration),
              _buildInfoRow('Schedule', courseInfo.meetingSchedule),
              if (courseInfo.prerequisites.isNotEmpty) ...[
                const SizedBox(height: 12),
                Text(
                  'Prerequisites:',
                  style: Theme.of(context).textTheme.titleMedium?.copyWith(
                    fontWeight: FontWeight.w600,
                  ),
                ),
                const SizedBox(height: 8),
                ...courseInfo.prerequisites.map((prereq) => Padding(
                  padding: const EdgeInsets.only(left: 16, bottom: 4),
                  child: Text('• $prereq'),
                )),
              ],
            ],
          ),
        ),
      );
    }
  
    Widget _buildInfoRow(String label, String value) {
      return Padding(
        padding: const EdgeInsets.only(bottom: 8),
        child: Row(
          crossAxisAlignment: CrossAxisAlignment.start,
          children: [
            SizedBox(
              width: 100,
              child: Text(
                '$label:',
                style: const TextStyle(fontWeight: FontWeight.w600),
              ),
            ),
            Expanded(
              child: Text(value),
            ),
          ],
        ),
      );
    }
  
    Widget _buildGradingBreakdownCard(BuildContext context, GradingBreakdown grading) {
      return Card(
        elevation: 4,
        child: Padding(
          padding: const EdgeInsets.all(20),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              Text(
                'Grading Breakdown',
                style: Theme.of(context).textTheme.titleLarge?.copyWith(
                  fontWeight: FontWeight.bold,
                ),
              ),
              const SizedBox(height: 16),
              ...grading.components.entries.map((entry) => Padding(
                padding: const EdgeInsets.only(bottom: 12),
                child: Row(
                  children: [
                    Container(
                      width: 60,
                      padding: const EdgeInsets.symmetric(vertical: 4, horizontal: 8),
                      decoration: BoxDecoration(
                        color: Theme.of(context).primaryColor,
                        borderRadius: BorderRadius.circular(12),
                      ),
                      child: Text(
                        '${entry.value.percentage}%',
                        style: const TextStyle(
                          color: Colors.white,
                          fontWeight: FontWeight.bold,
                          fontSize: 12,
                        ),
                        textAlign: TextAlign.center,
                      ),
                    ),
                    const SizedBox(width: 12),
                    Expanded(
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Text(
                            entry.key.replaceAll('_', ' ').toUpperCase(),
                            style: const TextStyle(fontWeight: FontWeight.w600),
                          ),
                          Text(
                            entry.value.description,
                            style: Theme.of(context).textTheme.bodySmall,
                          ),
                        ],
                      ),
                    ),
                  ],
                ),
              )),
            ],
          ),
        ),
      );
    }
  
    Widget _buildCoursePoliciesCard(BuildContext context, CoursePolicies policies) {
      return Card(
        elevation: 4,
        child: Padding(
          padding: const EdgeInsets.all(20),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              Text(
                'Course Policies',
                style: Theme.of(context).textTheme.titleLarge?.copyWith(
                  fontWeight: FontWeight.bold,
                ),
              ),
              const SizedBox(height: 16),
              _buildPolicySection('Attendance', policies.attendance),
              _buildPolicySection('Late Submissions', policies.lateSubmissions),
              _buildPolicySection('Academic Integrity', policies.academicIntegrity),
            ],
          ),
        ),
      );
    }
  
    Widget _buildPolicySection(String title, String content) {
      return Padding(
        padding: const EdgeInsets.only(bottom: 16),
        child: Column(
          crossAxisAlignment: CrossAxisAlignment.start,
          children: [
            Text(
              title,
              style: const TextStyle(fontWeight: FontWeight.w600),
            ),
            const SizedBox(height: 4),
            Text(
              content,
              style: const TextStyle(fontSize: 14),
            ),
          ],
        ),
      );
    }
  
    Widget _buildSessionCard(BuildContext context, ClassSession session) {
      return Card(
        elevation: 2,
        child: Padding(
          padding: const EdgeInsets.all(16),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              Row(
                children: [
                  Container(
                    padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 6),
                    decoration: BoxDecoration(
                      color: Theme.of(context).primaryColor,
                      borderRadius: BorderRadius.circular(20),
                    ),
                    child: Text(
                      'Week ${session.weekNumber}',
                      style: const TextStyle(
                        color: Colors.white,
                        fontWeight: FontWeight.bold,
                        fontSize: 12,
                      ),
                    ),
                  ),
                  const Spacer(),
                  Text(
                    session.date,
                    style: Theme.of(context).textTheme.bodySmall,
                  ),
                ],
              ),
              const SizedBox(height: 8),
              Text(
                session.topic,
                style: Theme.of(context).textTheme.titleMedium?.copyWith(
                  fontWeight: FontWeight.bold,
                ),
              ),
              const SizedBox(height: 8),
              Text(
                session.lectureNotes.introduction,
                style: Theme.of(context).textTheme.bodyMedium,
              ),
            ],
          ),
        ),
      );
    }
  
    Widget _buildQuizCard(BuildContext context, Quiz quiz) {
      return Card(
        elevation: 2,
        child: Padding(
          padding: const EdgeInsets.all(16),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              Row(
                children: [
                  Container(
                    padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 6),
                    decoration: BoxDecoration(
                      color: Colors.blue,
                      borderRadius: BorderRadius.circular(20),
                    ),
                    child: Text(
                      'Quiz ${quiz.quiz}',
                      style: const TextStyle(
                        color: Colors.white,
                        fontWeight: FontWeight.bold,
                        fontSize: 12,
                      ),
                    ),
                  ),
                  const Spacer(),
                  Container(
                    padding: const EdgeInsets.symmetric(horizontal: 8, vertical: 4),
                    decoration: BoxDecoration(
                      color: Colors.green.withOpacity(0.1),
                      borderRadius: BorderRadius.circular(12),
                    ),
                    child: Text(
                      '${quiz.totalPoints} pts',
                      style: TextStyle(
                        color: Colors.green[700],
                        fontWeight: FontWeight.w600,
                        fontSize: 12,
                      ),
                    ),
                  ),
                ],
              ),
              const SizedBox(height: 8),
              Text(
                quiz.topic,
                style: Theme.of(context).textTheme.titleMedium?.copyWith(
                  fontWeight: FontWeight.bold,
                ),
              ),
              const SizedBox(height: 8),
              Text(
                'Duration: ${quiz.duration} • ${quiz.questions.length} questions',
                style: Theme.of(context).textTheme.bodySmall,
              ),
              const SizedBox(height: 12),
              ElevatedButton.icon(
                onPressed: () => Navigator.push(
                  context,
                  MaterialPageRoute(
                    builder: (_) => QuizScreen(quiz: quiz),
                  ),
                ),
                icon: const Icon(Icons.play_arrow),
                label: const Text('Take Quiz'),
                style: ElevatedButton.styleFrom(
                  backgroundColor: Colors.blue,
                  foregroundColor: Colors.white,
                ),
              ),
            ],
          ),
        ),
      );
    }
  
    Widget _buildAssignmentCard(BuildContext context, Assignment assignment) {
      return Card(
        elevation: 2,
        child: Padding(
          padding: const EdgeInsets.all(16),
          child: Column(
            crossAxisAlignment: CrossAxisAlignment.start,
            children: [
              Row(
                children: [
                  Container(
                    padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 6),
                    decoration: BoxDecoration(
                      color: Colors.orange,
                      borderRadius: BorderRadius.circular(20),
                    ),
                    child: Text(
                      'Assignment ${assignment.assignment}',
                      style: const TextStyle(
                        color: Colors.white,
                        fontWeight: FontWeight.bold,
                        fontSize: 12,
                      ),
                    ),
                  ),
                  const Spacer(),
                  Container(
                    padding: const EdgeInsets.symmetric(horizontal: 8, vertical: 4),
                    decoration: BoxDecoration(
                      color: Colors.green.withOpacity(0.1),
                      borderRadius: BorderRadius.circular(12),
                    ),
                    child: Text(
                      '${assignment.points} pts',
                      style: TextStyle(
                        color: Colors.green[700],
                        fontWeight: FontWeight.w600,
                        fontSize: 12,
                      ),
                    ),
                  ),
                ],
              ),
              const SizedBox(height: 8),
              Text(
                assignment.title,
                style: Theme.of(context).textTheme.titleMedium?.copyWith(
                  fontWeight: FontWeight.bold,
                ),
              ),
              const SizedBox(height: 8),
              Text(
                assignment.description,
                style: Theme.of(context).textTheme.bodyMedium,
                maxLines: 3,
                overflow: TextOverflow.ellipsis,
              ),
              const SizedBox(height: 8),
              Text(
                'Due: Week ${assignment.weekDue}',
                style: Theme.of(context).textTheme.bodySmall?.copyWith(
                  color: Colors.orange[700],
                  fontWeight: FontWeight.w500,
                ),
              ),
              const SizedBox(height: 12),
              ElevatedButton.icon(
                onPressed: () => Navigator.push(
                  context,
                  MaterialPageRoute(
                    builder: (_) => AssignmentScreen(assignment: assignment),
                  ),
                ),
                icon: const Icon(Icons.assignment),
                label: const Text('View Assignment'),
                style: ElevatedButton.styleFrom(
                  backgroundColor: Colors.orange,
                  foregroundColor: Colors.white,
                ),
              ),
            ],
          ),
        ),
      );
    }
  }

lib/screens/quiz_screen.dart: |
  import 'package:flutter/material.dart';
  import 'package:provider/provider.dart';
  import '../models/class_detail.dart';
  import '../services/ai_service.dart';
  import '../widgets/ai_grading_widget.dart';
  
  class QuizScreen extends StatefulWidget {
    final Quiz quiz;
  
    const QuizScreen({super.key, required this.quiz});
  
    @override
    State<QuizScreen> createState() => _QuizScreenState();
  }
  
  class _QuizScreenState extends State<QuizScreen> {
    final PageController _pageController = PageController();
    final List<TextEditingController> _answerControllers = [];
    final List<AIGradingResult?> _gradingResults = [];
    int _currentQuestionIndex = 0;
    bool _quizCompleted = false;
  
    @override
    void initState() {
      super.initState();
      for (int i = 0; i < widget.quiz.questions.length; i++) {
        _answerControllers.add(TextEditingController());
        _gradingResults.add(null);
      }
    }
  
    @override
    void dispose() {
      for (final controller in _answerControllers) {
        controller.dispose();
      }
      _pageController.dispose();
      super.dispose();
    }
  
    @override
    Widget build(BuildContext context) {
      return Scaffold(
        appBar: AppBar(
          title: Text('Quiz ${widget.quiz.quiz}: ${widget.quiz.topic}'),
          backgroundColor: Colors.blue,
          foregroundColor: Colors.white,
          actions: [
            Padding(
              padding: const EdgeInsets.only(right: 16),
              child: Center(
                child: Text(
                  '${_currentQuestionIndex + 1}/${widget.quiz.questions.length}',
                  style: const TextStyle(
                    fontWeight: FontWeight.bold,
                    fontSize: 16,
                  ),
                ),
              ),
            ),
          ],
        ),
        body: Column(
          children: [
            LinearProgressIndicator(
              value: (_currentQuestionIndex + 1) / widget.quiz.questions.length,
              backgroundColor: Colors.grey[300],
              valueColor: const AlwaysStoppedAnimation<Color>(Colors.blue),
            ),
            Expanded(
              child: PageView.builder(
                controller: _pageController,
                onPageChanged: (index) {
                  setState(() {
                    _currentQuestionIndex = index;
                  });
                },
                itemCount: widget.quiz.questions.length + (_quizCompleted ? 1 : 0),
                itemBuilder: (context, index) {
                  if (index == widget.quiz.questions.length) {
                    return _buildResultsPage();
                  }
                  return _buildQuestionPage(index);
                },
              ),
            ),
            _buildNavigationBar(),
          ],
        ),
      );
    }
  
    Widget _buildQuestionPage(int index) {
      final question = widget.quiz.questions[index];
      final controller = _answerControllers[index];
      final gradingResult = _gradingResults[index];
  
      return SingleChildScrollView(
        padding: const EdgeInsets.all(16),
        child: Column(
          crossAxisAlignment: CrossAxisAlignment.start,
          children: [
            Card(
              elevation: 4,
              child: Padding(
                padding: const EdgeInsets.all(20),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    Row(
                      children: [
                        Container(
                          padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 6),
                          decoration: BoxDecoration(
                            color: Colors.blue,
                            borderRadius: BorderRadius.circular(20),
                          ),
                          child: Text(
                            'Question ${index + 1}',
                            style: const TextStyle(
                              color: Colors.white,
                              fontWeight: FontWeight.bold,
                            ),
                          ),
                        ),
                        const Spacer(),
                        Container(
                          padding: const EdgeInsets.symmetric(horizontal: 8, vertical: 4),
                          decoration: BoxDecoration(
                            color: Colors.green.withOpacity(0.1),
                            borderRadius: BorderRadius.circular(12),
                          ),
                          child: Text(
                            '${question.points} points',
                            style: TextStyle(
                              color: Colors.green[700],
                              fontWeight: FontWeight.w600,
                            ),
                          ),
                        ),
                      ],
                    ),
                    const SizedBox(height: 16),
                    Text(
                      question.question,
                      style: Theme.of(context).textTheme.titleMedium?.copyWith(
                        fontWeight: FontWeight.w600,
                      ),
                    ),
                    const SizedBox(height: 8),
                    Text(
                      'Type: ${question.type}',
                      style: Theme.of(context).textTheme.bodySmall?.copyWith(
                        color: Colors.grey[600],
                      ),
                    ),
                  ],
                ),
              ),
            ),
            const SizedBox(height: 16),
            Card(
              elevation: 2,
              child: Padding(
                padding: const EdgeInsets.all(16),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    Text(
                      'Your Answer:',
                      style: Theme.of(context).textTheme.titleMedium?.copyWith(
                        fontWeight: FontWeight.bold,
                      ),
                    ),
                    const SizedBox(height: 12),
                    TextField(
                      controller: controller,
                      maxLines: question.type == 'essay' ? 8 : 4,
                      decoration: InputDecoration(
                        hintText: _getHintText(question.type),
                        border: const OutlineInputBorder(),
                        filled: true,
                        fillColor: Colors.grey[50],
                      ),
                    ),
                    const SizedBox(height: 16),
                    Row(
                      children: [
                        ElevatedButton.icon(
                          onPressed: gradingResult == null ? () => _submitAnswer(index) : null,
                          icon: gradingResult == null 
                              ? const Icon(Icons.send) 
                              : const Icon(Icons.check),
                          label: Text(gradingResult == null ? 'Submit Answer' : 'Submitted'),
                          style: ElevatedButton.styleFrom(
                            backgroundColor: gradingResult == null ? Colors.blue : Colors.green,
                            foregroundColor: Colors.white,
                          ),
                        ),
                        const SizedBox(width: 8),
                        if (gradingResult != null)
                          Container(
                            padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 8),
                            decoration: BoxDecoration(
                              color: _getGradeColor(gradingResult.percentage).withOpacity(0.1),
                              borderRadius: BorderRadius.circular(12),
                              border: Border.all(
                                color: _getGradeColor(gradingResult.percentage),
                              ),
                            ),
                            child: Text(
                              '${gradingResult.score}/${gradingResult.maxScore} (${gradingResult.letterGrade})',
                              style: TextStyle(
                                color: _getGradeColor(gradingResult.percentage),
                                fontWeight: FontWeight.bold,
                              ),
                            ),
                          ),
                      ],
                    ),
                  ],
                ),
              ),
            ),
            if (gradingResult != null) ...[
              const SizedBox(height: 16),
              AIGradingWidget(gradingResult: gradingResult),
            ],
          ],
        ),
      );
    }
  
    Widget _buildResultsPage() {
      final totalScore = _gradingResults
          .where((result) => result != null)
          .fold<int>(0, (sum, result) => sum + result!.score);
      final maxScore = widget.quiz.totalPoints;
      final percentage = (totalScore / maxScore) * 100;
  
      return SingleChildScrollView(
        padding: const EdgeInsets.all(16),
        child: Column(
          children: [
            Card(
              elevation: 4,
              child: Padding(
                padding: const EdgeInsets.all(24),
                child: Column(
                  children: [
                    Icon(
                      Icons.celebration,
                      size: 80,
                      color: _getGradeColor(percentage),
                    ),
                    const SizedBox(height: 16),
                    Text(
                      'Quiz Completed!',
                      style: Theme.of(context).textTheme.headlineSmall?.copyWith(
                        fontWeight: FontWeight.bold,
                      ),
                    ),
                    const SizedBox(height: 16),
                    Container(
                      padding: const EdgeInsets.all(20),
                      decoration: BoxDecoration(
                        color: _getGradeColor(percentage).withOpacity(0.1),
                        borderRadius: BorderRadius.circular(16),
                        border: Border.all(color: _getGradeColor(percentage)),
                      ),
                      child: Column(
                        children: [
                          Text(
                            '$totalScore / $maxScore',
                            style: TextStyle(
                              fontSize: 32,
                              fontWeight: FontWeight.bold,
                              color: _getGradeColor(percentage),
                            ),
                          ),
                          Text(
                            '${percentage.toStringAsFixed(1)}%',
                            style: TextStyle(
                              fontSize: 24,
                              fontWeight: FontWeight.w600,
                              color: _getGradeColor(percentage),
                            ),
                          ),
                          Text(
                            _getLetterGrade(percentage),
                            style: TextStyle(
                              fontSize: 20,
                              fontWeight: FontWeight.bold,
                              color: _getGradeColor(percentage),
                            ),
                          ),
                        ],
                      ),
                    ),
                  ],
                ),
              ),
            ),
            const SizedBox(height: 16),
            Card(
              elevation: 2,
              child: Padding(
                padding: const EdgeInsets.all(16),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    Text(
                      'Question Summary',
                      style: Theme.of(context).textTheme.titleLarge?.copyWith(
                        fontWeight: FontWeight.bold,
                      ),
                    ),
                    const SizedBox(height: 12),
                    ...List.generate(widget.quiz.questions.length, (index) {
                      final result = _gradingResults[index];
                      if (result == null) return const SizedBox.shrink();
  
                      return Padding(
                        padding: const EdgeInsets.only(bottom: 8),
                        child: Row(
                          children: [
                            Container(
                              width: 30,
                              height: 30,
                              decoration: BoxDecoration(
                                color: _getGradeColor(result.percentage),
                                shape: BoxShape.circle,
                              ),
                              child: Center(
                                child: Text(
                                  '${index + 1}',
                                  style: const TextStyle(
                                    color: Colors.white,
                                    fontWeight: FontWeight.bold,
                                  ),
                                ),
                              ),
                            ),
                            const SizedBox(width: 12),
                            Expanded(
                              child: Text(
                                widget.quiz.questions[index].question,
                                maxLines: 1,
                                overflow: TextOverflow.ellipsis,
                              ),
                            ),
                            Text(
                              '${result.score}/${result.maxScore}',
                              style: TextStyle(
                                fontWeight: FontWeight.bold,
                                color: _getGradeColor(result.percentage),
                              ),
                            ),
                          ],
                        ),
                      );
                    }),
                  ],
                ),
              ),
            ),
          ],
        ),
      );
    }
  
    Widget _buildNavigationBar() {
      return Container(
        padding: const EdgeInsets.all(16),
        decoration: BoxDecoration(
          color: Colors.white,
          boxShadow: [
            BoxShadow(
              color: Colors.grey.withOpacity(0.3),
              spreadRadius: 1,
              blurRadius: 5,
              offset: const Offset(0, -3),
            ),
          ],
        ),
        child: Row(
          children: [
            if (_currentQuestionIndex > 0)
              ElevatedButton.icon(
                onPressed: () {
                  _pageController.previousPage(
                    duration: const Duration(milliseconds: 300),
                    curve: Curves.easeInOut,
                  );
                },
                icon: const Icon(Icons.arrow_back),
                label: const Text('Previous'),
              ),
            const Spacer(),
            if (_currentQuestionIndex < widget.quiz.questions.length - 1)
              ElevatedButton.icon(
                onPressed: () {
                  _pageController.nextPage(
                    duration: const Duration(milliseconds: 300),
                    curve: Curves.easeInOut,
                  );
                },
                icon: const Icon(Icons.arrow_forward),
                label: const Text('Next'),
              )
            else if (!_quizCompleted && _allQuestionsAnswered())
              ElevatedButton.icon(
                onPressed: _completeQuiz,
                icon: const Icon(Icons.check),
                label: const Text('Finish Quiz'),
                style: ElevatedButton.styleFrom(
                  backgroundColor: Colors.green,
                  foregroundColor: Colors.white,
                ),
              ),
          ],
        ),
      );
    }
  
    String _getHintText(String type) {
      switch (type) {
        case 'calculation':
          return 'Show your work and provide the final answer...';
        case 'short_answer':
          return 'Provide a concise explanation...';
        case 'essay':
          return 'Write a detailed response...';
        case 'code':
          return 'Write your code here...';
        default:
          return 'Enter your answer...';
      }
    }
  
    void _submitAnswer(int index) async {
      final controller = _answerControllers[index];
      final question = widget.quiz.questions[index];
  
      if (controller.text.trim().isEmpty) {
        ScaffoldMessenger.of(context).showSnackBar(
          const SnackBar(content: Text('Please enter an answer before submitting')),
        );
        return;
      }
  
      final aiService = Provider.of<AIService>(context, listen: false);
  
      try {
        final result = await aiService.gradeQuizAnswer(question, controller.text);
        setState(() {
          _gradingResults[index] = result;
        });
      } catch (e) {
        ScaffoldMessenger.of(context).showSnackBar(
          SnackBar(content: Text('Error grading answer: $e')),
        );
      }
    }
  
    bool _allQuestionsAnswered() {
      return _gradingResults.every((result) => result != null);
    }
  
    void _completeQuiz() {
      setState(() {
        _quizCompleted = true;
      });
      _pageController.nextPage(
        duration: const Duration(milliseconds: 300),
        curve: Curves.easeInOut,
      );
    }
  
    Color _getGradeColor(double percentage) {
      if (percentage >= 90) return Colors.green;
      if (percentage >= 80) return Colors.blue;
      if (percentage >= 70) return Colors.orange;
      if (percentage >= 60) return Colors.deepOrange;
      return Colors.red;
    }
  
    String _getLetterGrade(double percentage) {
      if (percentage >= 97) return 'A+';
      if (percentage >= 93) return 'A';
      if (percentage >= 90) return 'A-';
      if (percentage >= 87) return 'B+';
      if (percentage >= 83) return 'B';
      if (percentage >= 80) return 'B-';
      if (percentage >= 77) return 'C+';
      if (percentage >= 73) return 'C';
      if (percentage >= 70) return 'C-';
      if (percentage >= 67) return 'D+';
      if (percentage >= 63) return 'D';
      if (percentage >= 60) return 'D-';
      return 'F';
    }
  }

