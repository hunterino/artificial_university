lib/models/class_detail.dart: |
  class ClassDetail {
    final CourseInfo courseInfo;
    final List<ClassSession> classSchedule;
    final Assessments assessments;
    final GradingBreakdown gradingBreakdown;
    final CoursePolicies coursePolicies;
  
    ClassDetail({
      required this.courseInfo,
      required this.classSchedule,
      required this.assessments,
      required this.gradingBreakdown,
      required this.coursePolicies,
    });
  
    factory ClassDetail.fromJson(Map<String, dynamic> json) {
      return ClassDetail(
        courseInfo: CourseInfo.fromJson(json['course_info']),
        classSchedule: (json['class_schedule'] as List)
            .map((session) => ClassSession.fromJson(session))
            .toList(),
        assessments: Assessments.fromJson(json['assessments']),
        gradingBreakdown: GradingBreakdown.fromJson(json['grading_breakdown']),
        coursePolicies: CoursePolicies.fromJson(json['course_policies']),
      );
    }
  }
  
  class CourseInfo {
    final String courseId;
    final String title;
    final int creditHours;
    final String duration;
    final String meetingSchedule;
    final List<String> prerequisites;
  
    CourseInfo({
      required this.courseId,
      required this.title,
      required this.creditHours,
      required this.duration,
      required this.meetingSchedule,
      required this.prerequisites,
    });
  
    factory CourseInfo.fromJson(Map<String, dynamic> json) {
      return CourseInfo(
        courseId: json['course_id'],
        title: json['title'],
        creditHours: json['credit_hours'],
        duration: json['duration'],
        meetingSchedule: json['meeting_schedule'],
        prerequisites: (json['prerequisites'] as List).cast<String>(),
      );
    }
  }
  
  class ClassSession {
    final int weekNumber;
    final int sessionNumber;
    final String date;
    final String topic;
    final String duration;
    final List<String> learningObjectives;
    final List<String> readings;
    final LectureNotes lectureNotes;
  
    ClassSession({
      required this.weekNumber,
      required this.sessionNumber,
      required this.date,
      required this.topic,
      required this.duration,
      required this.learningObjectives,
      required this.readings,
      required this.lectureNotes,
    });
  
    factory ClassSession.fromJson(Map<String, dynamic> json) {
      return ClassSession(
        weekNumber: json['week_number'],
        sessionNumber: json['session_number'],
        date: json['date'],
        topic: json['topic'],
        duration: json['duration'],
        learningObjectives: (json['learning_objectives'] as List).cast<String>(),
        readings: (json['readings'] as List).cast<String>(),
        lectureNotes: LectureNotes.fromJson(json['lecture_notes']),
      );
    }
  }
  
  class LectureNotes {
    final String introduction;
    final List<String> keyConcepts;
    final String demonstration;
    final List<String> setupRequirements;
    final List<Map<String, String>> review;
  
    LectureNotes({
      required this.introduction,
      required this.keyConcepts,
      required this.demonstration,
      required this.setupRequirements,
      required this.review,
    });
  
    factory LectureNotes.fromJson(Map<String, dynamic> json) {
      return LectureNotes(
        introduction: json['introduction'],
        keyConcepts: (json['key_concepts'] as List).cast<String>(),
        demonstration: json['demonstration'],
        setupRequirements: (json['setup_requirements'] as List).cast<String>(),
        review: (json['review'] as List)
            .map((item) => Map<String, String>.from(item))
            .toList(),
      );
    }
  }
  
  class Assessments {
    final List<Quiz> quizzes;
    final List<Assignment> majorAssignments;
  
    Assessments({
      required this.quizzes,
      required this.majorAssignments,
    });
  
    factory Assessments.fromJson(Map<String, dynamic> json) {
      return Assessments(
        quizzes: (json['quizzes'] as List)
            .map((quiz) => Quiz.fromJson(quiz))
            .toList(),
        majorAssignments: (json['major_assignments'] as List?)
            ?.map((assignment) => Assignment.fromJson(assignment))
            .toList() ?? [],
      );
    }
  }
  
  class Quiz {
    final int quiz;
    final int week;
    final String topic;
    final String duration;
    final List<QuizQuestion> questions;
    final int totalPoints;
  
    Quiz({
      required this.quiz,
      required this.week,
      required this.topic,
      required this.duration,
      required this.questions,
      required this.totalPoints,
    });
  
    factory Quiz.fromJson(Map<String, dynamic> json) {
      return Quiz(
        quiz: json['quiz'],
        week: json['week'],
        topic: json['topic'],
        duration: json['duration'],
        questions: (json['questions'] as List)
            .map((q) => QuizQuestion.fromJson(q))
            .toList(),
        totalPoints: json['total_points'],
      );
    }
  }
  
  class QuizQuestion {
    final String question;
    final String type;
    final int points;
    final String answer;
    final List<Map<String, dynamic>> rubric;
  
    QuizQuestion({
      required this.question,
      required this.type,
      required this.points,
      required this.answer,
      required this.rubric,
    });
  
    factory QuizQuestion.fromJson(Map<String, dynamic> json) {
      return QuizQuestion(
        question: json['question'],
        type: json['type'],
        points: json['points'],
        answer: json['answer'],
        rubric: (json['rubric'] as List)
            .map((item) => Map<String, dynamic>.from(item))
            .toList(),
      );
    }
  }
  
  class Assignment {
    final int assignment;
    final String title;
    final int weekAssigned;
    final int weekDue;
    final int points;
    final String description;
    final List<String> objectives;
    final List<String> deliverables;
  
    Assignment({
      required this.assignment,
      required this.title,
      required this.weekAssigned,
      required this.weekDue,
      required this.points,
      required this.description,
      required this.objectives,
      required this.deliverables,
    });
  
    factory Assignment.fromJson(Map<String, dynamic> json) {
      return Assignment(
        assignment: json['assignment'],
        title: json['title'],
        weekAssigned: json['week_assigned'],
        weekDue: json['week_due'],
        points: json['points'],
        description: json['description'],
        objectives: (json['objectives'] as List).cast<String>(),
        deliverables: (json['deliverables'] as List).cast<String>(),
      );
    }
  }
  
  class GradingBreakdown {
    final Map<String, GradingComponent> components;
  
    GradingBreakdown({required this.components});
  
    factory GradingBreakdown.fromJson(Map<String, dynamic> json) {
      Map<String, GradingComponent> components = {};
      json.forEach((key, value) {
        components[key] = GradingComponent.fromJson(value);
      });
      return GradingBreakdown(components: components);
    }
  }
  
  class GradingComponent {
    final int percentage;
    final String description;
  
    GradingComponent({
      required this.percentage,
      required this.description,
    });
  
    factory GradingComponent.fromJson(Map<String, dynamic> json) {
      return GradingComponent(
        percentage: json['percentage'],
        description: json['description'],
      );
    }
  }
  
  class CoursePolicies {
    final String attendance;
    final String lateSubmissions;
    final String collaboration;
    final String academicIntegrity;
    final String technologyRequirements;
  
    CoursePolicies({
      required this.attendance,
      required this.lateSubmissions,
      required this.collaboration,
      required this.academicIntegrity,
      required this.technologyRequirements,
    });
  
    factory CoursePolicies.fromJson(Map<String, dynamic> json) {
      return CoursePolicies(
        attendance: json['attendance'],
        lateSubmissions: json['late_submissions'],
        collaboration: json['collaboration'],
        academicIntegrity: json['academic_integrity'],
        technologyRequirements: json['technology_requirements'],
      );
    }
  }

lib/services/data_service.dart: |
  import 'dart:convert';
  import 'package:flutter/material.dart';
  import 'package:flutter/services.dart';
  import '../models/university.dart';
  import '../models/degree.dart';
  import '../models/course.dart';
  import '../models/class_detail.dart';
  
  class DataService extends ChangeNotifier {
    University? _university;
    GeneralEducationRequirement? _generalEducation;
    List<DegreeProgram> _degreePrograms = [];
    Map<String, List<Course>> _coursesBySubject = {};
    Map<String, ClassDetail> _classDetails = {};
  
    University? get university => _university;
    GeneralEducationRequirement? get generalEducation => _generalEducation;
    List<DegreeProgram> get degreePrograms => _degreePrograms;
    Map<String, List<Course>> get coursesBySubject => _coursesBySubject;
  
    bool _isLoading = false;
    bool get isLoading => _isLoading;
  
    Future<void> loadUniversityData() async {
      _isLoading = true;
      notifyListeners();
  
      try {
        // Load university and degree data
        final universityData = await rootBundle.loadString('assets/university_degrees.json');
        final universityJson = json.decode(universityData);
  
        _university = University.fromJson(universityJson['university']);
        _generalEducation = GeneralEducationRequirement.fromJson(universityJson['general_education_requirements']);
        _degreePrograms = (universityJson['degree_programs'] as List)
            .map((degree) => DegreeProgram.fromJson(degree))
            .toList();
  
        // Load course descriptions
        final coursesData = await rootBundle.loadString('assets/all_classes.json');
        final coursesJson = json.decode(coursesData);
  
        (coursesJson['courses'] as Map<String, dynamic>).forEach((subject, courses) {
          _coursesBySubject[subject] = (courses as List)
              .map((course) => Course.fromJson(course))
              .toList();
        });
  
        // Load specific class details
        await _loadClassDetail('GD401');
  
      } catch (e) {
        print('Error loading data: $e');
      } finally {
        _isLoading = false;
        notifyListeners();
      }
    }
  
    Future<void> _loadClassDetail(String classId) async {
      try {
        final classData = await rootBundle.loadString('assets/classes/$classId.json');
        final classJson = json.decode(classData);
        _classDetails[classId] = ClassDetail.fromJson(classJson);
      } catch (e) {
        print('Error loading class detail for $classId: $e');
      }
    }
  
    ClassDetail? getClassDetail(String classId) {
      return _classDetails[classId];
    }
  
    DegreeProgram? getDegreeById(String degreeId) {
      try {
        return _degreePrograms.firstWhere((degree) => degree.degreeId == degreeId);
      } catch (e) {
        return null;
      }
    }
  
    List<Course> getCoursesForSubject(String subject) {
      return _coursesBySubject[subject] ?? [];
    }
  }

lib/services/ai_service.dart: |
  import 'dart:convert';
  import 'dart:math';
  import 'package:flutter/material.dart';
  import 'package:http/http.dart' as http;
  import '../models/class_detail.dart';
  
  class AIService extends ChangeNotifier {
    static const String _apiKey = 'YOUR_CLAUDE_API_KEY'; // Replace with actual API key
    static const String _apiUrl = 'https://api.anthropic.com/v1/messages';
  
    bool _isProcessing = false;
    bool get isProcessing => _isProcessing;
  
    // Simulated AI grading for demo purposes
    Future<AIGradingResult> gradeQuizAnswer(
      QuizQuestion question,
      String studentAnswer,
    ) async {
      _isProcessing = true;
      notifyListeners();
  
      try {
        // In a real implementation, this would call Claude API
        // For demo purposes, we'll simulate AI grading
        await Future.delayed(const Duration(seconds: 2));
  
        final result = _simulateAIGrading(question, studentAnswer);
  
        return result;
      } catch (e) {
        return AIGradingResult(
          score: 0,
          maxScore: question.points,
          feedback: 'Error grading response: $e',
          rubricBreakdown: [],
        );
      } finally {
        _isProcessing = false;
        notifyListeners();
      }
    }
  
    AIGradingResult _simulateAIGrading(QuizQuestion question, String studentAnswer) {
      final random = Random();
      final rubricBreakdown = <RubricScore>[];
      int totalScore = 0;
  
      // Simulate AI analysis of answer against rubric
      for (final rubricItem in question.rubric) {
        final maxPoints = rubricItem['value'] as int;
        // Simulate scoring based on answer quality (in real app, this would use Claude)
        final score = _evaluateAnswerComponent(studentAnswer, rubricItem['key'], maxPoints);
  
        rubricBreakdown.add(RubricScore(
          criterion: rubricItem['key'],
          score: score,
          maxScore: maxPoints,
          feedback: _generateFeedback(rubricItem['key'], score, maxPoints),
        ));
  
        totalScore += score;
      }
  
      return AIGradingResult(
        score: totalScore,
        maxScore: question.points,
        feedback: _generateOverallFeedback(totalScore, question.points, studentAnswer),
        rubricBreakdown: rubricBreakdown,
      );
    }
  
    int _evaluateAnswerComponent(String answer, String criterion, int maxPoints) {
      // Simplified evaluation - in real implementation, use Claude API
      final answerLength = answer.length;
      final hasKeywords = _checkForKeywords(answer, criterion);
  
      if (answerLength < 20) return (maxPoints * 0.3).round();
      if (answerLength < 50 && hasKeywords) return (maxPoints * 0.6).round();
      if (answerLength >= 50 && hasKeywords) return (maxPoints * 0.9).round();
      if (answerLength >= 100 && hasKeywords) return maxPoints;
  
      return (maxPoints * 0.5).round();
    }
  
    bool _checkForKeywords(String answer, String criterion) {
      final lowerAnswer = answer.toLowerCase();
      final lowerCriterion = criterion.toLowerCase();
  
      // Simple keyword matching
      if (lowerCriterion.contains('matrix') && lowerAnswer.contains('matrix')) return true;
      if (lowerCriterion.contains('quaternion') && lowerAnswer.contains('quaternion')) return true;
      if (lowerCriterion.contains('gimbal') && lowerAnswer.contains('gimbal')) return true;
      if (lowerCriterion.contains('shader') && lowerAnswer.contains('shader')) return true;
      if (lowerCriterion.contains('rendering') && lowerAnswer.contains('render')) return true;
  
      return lowerAnswer.length > 30; // Basic length check
    }
  
    String _generateFeedback(String criterion, int score, int maxScore) {
      final percentage = (score / maxScore) * 100;
  
      if (percentage >= 90) {
        return 'Excellent work on $criterion! Your answer demonstrates strong understanding.';
      } else if (percentage >= 70) {
        return 'Good understanding of $criterion, but could be more detailed.';
      } else if (percentage >= 50) {
        return 'Basic understanding of $criterion shown, needs more elaboration.';
      } else {
        return 'Limited understanding of $criterion demonstrated. Review course materials.';
      }
    }
  
    String _generateOverallFeedback(int score, int maxScore, String answer) {
      final percentage = (score / maxScore) * 100;
  
      if (percentage >= 90) {
        return 'Outstanding work! Your answer demonstrates excellent mastery of the concepts. Keep up the great work!';
      } else if (percentage >= 80) {
        return 'Very good work! You show strong understanding with room for minor improvements.';
      } else if (percentage >= 70) {
        return 'Good effort! You understand the basic concepts but could benefit from more detailed explanations.';
      } else if (percentage >= 60) {
        return 'Fair understanding shown. Review the course materials and try to provide more comprehensive answers.';
      } else {
        return 'Your answer needs significant improvement. Please review the course materials and consider seeking additional help.';
      }
    }
  
    // Real Claude API implementation (commented out for demo)
    /*
