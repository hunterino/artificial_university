pubspec.yaml: |
  name: artificial_university
  description: An AI-powered university Flutter app
  
  version: 1.0.0+1
  
  environment:
    sdk: '>=3.0.0 <4.0.0'
    flutter: ">=3.10.0"
  
  dependencies:
    flutter:
      sdk: flutter
    http: ^1.1.0
    shared_preferences: ^2.2.2
    provider: ^6.1.1
    google_fonts: ^6.1.0
    animations: ^2.0.8
    lottie: ^2.7.0
    flutter_markdown: ^0.6.18
    flutter_staggered_animations: ^1.1.1
  
  dev_dependencies:
    flutter_test:
      sdk: flutter
    flutter_lints: ^3.0.0
  
  flutter:
    uses-material-design: true
    assets:
      - assets/data/
      - assets/images/
      - assets/animations/

lib/main.dart: |
  import 'package:flutter/material.dart';
  import 'package:provider/provider.dart';
  import 'package:google_fonts/google_fonts.dart';
  import 'screens/home_screen.dart';
  import 'services/data_service.dart';
  import 'services/ai_service.dart';
  
  void main() {
    runApp(const ArtificialUniversityApp());
  }
  
  class ArtificialUniversityApp extends StatelessWidget {
    const ArtificialUniversityApp({super.key});
  
    @override
    Widget build(BuildContext context) {
      return MultiProvider(
        providers: [
          ChangeNotifierProvider(create: (_) => DataService()),
          ChangeNotifierProvider(create: (_) => AIService()),
        ],
        child: MaterialApp(
          title: 'Artificial University',
          theme: ThemeData(
            primarySwatch: Colors.deepPurple,
            textTheme: GoogleFonts.interTextTheme(),
            useMaterial3: true,
            colorScheme: ColorScheme.fromSeed(
              seedColor: Colors.deepPurple,
              brightness: Brightness.light,
            ),
          ),
          home: const HomeScreen(),
          debugShowCheckedModeBanner: false,
        ),
      );
    }
  }

lib/models/university.dart: |
  class University {
    final String name;
    final String mission;
    final String accreditation;
    final int established;
    final String learningModel;
    final String assessmentMethod;
  
    University({
      required this.name,
      required this.mission,
      required this.accreditation,
      required this.established,
      required this.learningModel,
      required this.assessmentMethod,
    });
  
    factory University.fromJson(Map<String, dynamic> json) {
      return University(
        name: json['name'],
        mission: json['mission'],
        accreditation: json['accreditation'],
        established: json['established'],
        learningModel: json['learning_model'],
        assessmentMethod: json['assessment_method'],
      );
    }
  }
  
  class GeneralEducationRequirement {
    final int totalCredits;
    final List<CourseCategory> categories;
  
    GeneralEducationRequirement({
      required this.totalCredits,
      required this.categories,
    });
  
    factory GeneralEducationRequirement.fromJson(Map<String, dynamic> json) {
      return GeneralEducationRequirement(
        totalCredits: json['total_credits'],
        categories: (json['categories'] as List)
            .map((cat) => CourseCategory.fromJson(cat))
            .toList(),
      );
    }
  }
  
  class CourseCategory {
    final String category;
    final int credits;
    final List<Course> courses;
  
    CourseCategory({
      required this.category,
      required this.credits,
      required this.courses,
    });
  
    factory CourseCategory.fromJson(Map<String, dynamic> json) {
      return CourseCategory(
        category: json['category'],
        credits: json['credits'],
        courses: (json['courses'] as List)
            .map((course) => Course.fromJson(course))
            .toList(),
      );
    }
  }

